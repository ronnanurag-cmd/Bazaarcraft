<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarCraft | Add a Market Tour</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        :root {
            --primary: #FF7B00; 
            --bg-base: #0B0B0F; 
            --surface: #1A1A24; 
            --text-main: #FFFFFF;
            --text-muted: #A0A0B0;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-base);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: rgba(11, 11, 15, 0.85);
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(45deg, #FF7B00, #FFB703);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .nav-link {
            text-decoration: none;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: var(--primary);
        }

        .container {
            max-width: 600px; 
            margin: 40px auto;
            padding: 0 20px;
        }

        .form-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .form-title {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .form-subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px 15px;
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary);
        }

        /* Changes placeholder text color */
        .form-control::placeholder {
            color: #555;
        }

        select.form-control {
            appearance: none;
            cursor: pointer;
        }

        .submit-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s ease;
        }

        .submit-btn:hover {
            background: #e66e00;
        }

    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">BazaarCraft</a>
        <a href="index.html" class="nav-link">← Back to Feed</a>
    </header>

    <div class="container">
        <div class="form-card">
            <h2 class="form-title">Submit a Market Tour</h2>
            <p class="form-subtitle">Help us map the best local markets. Drop a link to a YouTube, Instagram, or Facebook video below!</p>

            <form name="submit-tour" method="POST" data-netlify="true">
                
                <div class="form-group">
                    <label for="platform">Platform</label>
                    <select id="platform" name="platform" class="form-control" required>
                        <option value="youtube">YouTube</option>
                        <option value="instagram">Instagram Reel</option>
                        <option value="facebook">Facebook Video</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="video-link">Video Link</label>
                    <input type="url" id="video-link" name="video-link" class="form-control" placeholder="https://..." required>
                </div>

                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" name="city" class="form-control" placeholder="e.g., Delhi, Mumbai..." required>
                </div>

                <div class="form-group">
                    <label for="market-name">Market Name / Category</label>
                    <input type="text" id="market-name" name="market-name" class="form-control" placeholder="e.g., Banjara Market, Brass, Furniture..." required>
                </div>

                <button type="submit" class="submit-btn">Submit to BazaarCraft</button>
            </form>
        </div>
    </div>

</body>
</html>
