<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarCraft | The Visual Market Catalog</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Poppins:wght@300;400;600&display=swap');
        
        :root {
            --primary: #FF7B00; --bg: #050507; --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1); --accent: #FFB703;
        }

        body { 
            margin: 0; font-family: 'Poppins', sans-serif; background-color: var(--bg); color: white;
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #050507 80%);
            min-height: 100vh;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-family: 'Syncopate', sans-serif; font-size: 18px; color: var(--primary); text-decoration: none; }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 30px; }

        .market-card {
            background: var(--glass); border: 1px solid var(--border); border-radius: 32px;
            padding: 25px; backdrop-filter: blur(15px); transition: 0.5s ease;
        }

        /* The Visual Item List */
        .catalog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .item-card { 
            background: rgba(255,255,255,0.02); border-radius: 20px; padding: 10px; 
            border: 1px solid transparent; transition: 0.3s; cursor: pointer;
        }
        .item-card:hover { border-color: var(--primary); background: rgba(255,123,0,0.05); }
        .item-img { width: 100%; height: 100px; object-fit: cover; border-radius: 12px; margin-bottom: 10px; background: #222; }
        .item-info { font-size: 12px; display: flex; justify-content: space-between; align-items: center; }
        .price-tag { color: #4ade80; font-weight: 700; }

        .nav-script { font-size: 11px; color: var(--accent); background: rgba(255,183,3,0.05); padding: 12px; border-radius: 15px; margin-bottom: 15px; }
        .video-box { display: none; margin-top: 20px; border-radius: 20px; overflow: hidden; }

        .footer-intel {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(30px);
            padding: 18px 40px; border-radius: 60px; border: 1px solid var(--primary);
            display: flex; align-items: center; gap: 50px; z-index: 2000;
        }
    </style>
</head>
<body>
    <header>
        <a href="#" class="logo">BAZAARCRAFT</a>
        <select id="city-selector" onchange="updateFeed(this.value)" style="background:none; color:white; border:none; font-weight:700;">
            <option value="delhi">DELHI</option>
            <option value="mumbai">MUMBAI</option>
            <option value="kolkata">KOLKATA</option>
            <option value="jaipur">JAIPUR</option>
            <option value="varanasi">VARANASI</option>
        </select>
    </header>

    <div class="container" id="feed"></div>

    <div class="footer-intel">
        <div>
            <span style="font-size:10px; opacity:0.6; display:block;">ESTIMATED BUDGET</span>
            <span id="budget-total" style="font-size:24px; font-weight:700; color:var(--primary);">₹0</span>
        </div>
        <button onclick="resetTotal()" style="background:none; border:1px solid #444; color:white; padding:10px 20px; border-radius:30px; cursor:pointer;">RESET</button>
    </div>

    <script>
        let currentBudget = 0;
        
        // --- DATA WITH SNAPSHOTS (EXTRACTED FROM VIDEOS) ---
        const masterDB = {
            "delhi": [
                { 
                    id: "oxdjZ8nSDOs", m: "Banjara Market", 
                    items: [
                        {n: "Antique Mirror", p: 1200, img: "https://images.unsplash.com/photo-1618220179428-22790b461013?w=200"}, 
                        {n: "Blue Ceramic Pot", p: 250, img: "https://images.unsplash.com/photo-1581781870027-04212e231e96?w=200"}
                    ],
                    nav: "Exit Sector 54 Metro. Rickshaw to 'Gaushala Road'. Gali 2 for mirrors.",
                    tip: "Check for chips in ceramics."
                }
            ],
            "varanasi": [
                { 
                    id: "Rf1IHg85_TQ", m: "Thatheri Bazaar", 
                    items: [
                        {n: "Brass Kalash", p: 450, img: "https://images.unsplash.com/photo-1621360841013-c7683c659ec6?w=200"},
                        {n: "Copper Tumbler", p: 350, img: "https://images.unsplash.com/photo-1603396530184-fb424596329c?w=200"}
                    ],
                    nav: "From Godowlia, walk towards Chowk. Ask for Thatheri Gali.",
                    tip: "Buy by weight (KG)."
                }
            ]
            // ... (All other cities Lucknow, Patna, Jaipur, etc. follow this format)
        };

        function render(list) {
            const feed = document.getElementById('feed'); feed.innerHTML = "";
            list.forEach(v => {
                const card = document.createElement('div'); card.className = 'market-card';
                card.innerHTML = `
                    <div style="font-size:10px; color:var(--primary); font-weight:700; letter-spacing:1px; margin-bottom:15px;">${v.m.toUpperCase()} CATALOG</div>
                    <div class="catalog-grid">
                        ${v.items.map(i => `
                            <div class="item-card" onclick="addToBudget(${i.p})">
                                <img src="${i.img}" class="item-img" alt="${i.n}">
                                <div class="item-info">
                                    <span>${i.n}</span>
                                    <span class="price-tag">₹${i.p}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="nav-script">📍 ${v.nav}</div>
                    <button onclick="toggleVideo('${v.id}')" style="width:100%; padding:15px; border-radius:18px; border:none; background:white; color:black; font-weight:700; cursor:pointer;">WATCH VIDEO TOUR</button>
                    <div id="${v.id}" class="video-box">
                        <div style="position:relative; padding-bottom:56.25%; height:0;"><iframe src="https://www.youtube.com/embed/${v.id}" style="position:absolute; width:100%; height:100%; border:none;" allowfullscreen></iframe></div>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        function addToBudget(p) { currentBudget += p; document.getElementById('budget-total').innerText = "₹" + currentBudget; }
        function resetTotal() { currentBudget = 0; document.getElementById('budget-total').innerText = "₹0"; }
        function toggleVideo(id) { let box = document.getElementById(id); box.style.display = (box.style.display === 'block') ? 'none' : 'block'; }
        function updateFeed(val) { render(masterDB[val]); }

        window.onload = () => render(masterDB.delhi);
    </script>
</body>
</html>
