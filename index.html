<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarCraft | India's Local Market Hub</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        :root {
            --primary: #FF7B00; --bg-base: #0B0B0F; --surface: #1A1A24; 
            --text-main: #FFFFFF; --text-muted: #A0A0B0; --accent: #FFB703;
            --ig-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }
        body { margin: 0; font-family: 'Poppins', sans-serif; background-color: var(--bg-base); color: var(--text-main); -webkit-font-smoothing: antialiased; }
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: rgba(11, 11, 15, 0.9); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-size: 20px; font-weight: 700; background: linear-gradient(45deg, #FF7B00, #FFB703); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        .header-right { display: flex; align-items: center; gap: 10px; }
        select.location-dropdown { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 5px; border-radius: 10px; font-size: 11px; outline: none; }
        .login-btn { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 600; cursor: pointer; }
        .user-profile { display: none; align-items: center; gap: 8px; }
        .profile-pic { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--primary); }

        .hero { text-align: center; padding: 40px 20px; background: radial-gradient(circle at top, rgba(255, 123, 0, 0.1) 0%, transparent 70%); }
        .search-container { display: flex; max-width: 450px; margin: 0 auto; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 4px; }
        .search-input { flex: 1; background: transparent; border: none; padding: 8px 15px; color: white; outline: none; }
        .search-btn { background: var(--primary); color: white; border: none; padding: 8px 18px; border-radius: 20px; font-size: 12px; cursor: pointer; }

        .container { max-width: 550px; margin: 0 auto; padding: 20px 15px 60px; }
        .section-title { font-size: 1.2rem; margin: 20px 0; border-left: 4px solid var(--primary); padding-left: 12px; }

        .decor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .decor-card { background: var(--surface); border-radius: 12px; padding: 10px; text-decoration: none; color: white; border: 1px solid rgba(255,255,255,0.05); }

        .video-card { background: var(--surface); border-radius: 16px; overflow: hidden; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.05); }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .native-link-card { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 50px 20px; text-decoration: none; color: white; }
        .instagram-card { background: var(--ig-gradient); }

        .product-list { padding: 15px; background: rgba(0,0,0,0.2); }
        .product-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 13px; }
        .price-tag { margin-left: auto; color: #4ade80; font-weight: 700; }
        
        .bargain-board { background: rgba(255, 183, 3, 0.1); padding: 10px 15px; border-top: 1px solid rgba(255, 183, 3, 0.2); font-size: 11px; }
        .bargain-tag { color: var(--accent); font-weight: 700; margin-right: 5px; }

        .action-bar { display: flex; justify-content: space-between; padding: 10px 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .icon-btn { background: transparent; border: none; color: var(--text-muted); font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">BazaarCraft</a>
        <div class="header-right">
            <select id="city-selector" class="location-dropdown" onchange="handleDropdownChange(this.value)">
                <option value="delhi">Delhi</option>
                <option value="mumbai">Mumbai</option>
                <option value="bangalore">Bangalore</option>
                <option value="pune">Pune</option>
                <option value="kolkata">Kolkata</option>
                <option value="jaipur">Jaipur</option>
                <option value="lucknow">Lucknow</option>
                <option value="patna">Patna</option>
                <option value="bhopal">Bhopal</option>
                <option value="varanasi">Varanasi</option>
                <option value="indore">Indore</option>
            </select>
            <button id="login-btn" class="login-btn" onclick="signIn()">Login</button>
            <div id="user-info" class="user-profile">
                <img id="user-pic" class="profile-pic" src="">
                <span id="user-name" style="font-size:11px"></span>
            </div>
        </div>
    </header>

    <div class="hero">
        <h1 style="font-size:1.4rem; font-style:italic; color:var(--accent)">"India's hidden aesthetic, mapped for you."</h1>
        <div class="search-container">
            <input type="text" id="market-search" class="search-input" placeholder="Search Markets (Banjara, Gariahat, Blue Pottery...)" onkeypress="handleEnter(event)">
            <button class="search-btn" onclick="executeSearch()">Go</button>
        </div>
    </div>

    <div class="container">
        <h2 class="section-title">Shop Curated Decor</h2>
        <div class="decor-grid">
            <a href="https://amazon.in" target="_blank" class="decor-card"><div>🏺</div><div style="font-size:11px">Ceramic Vase</div><span style="color:#4ade80; font-size:12px;">₹299</span></a>
            <a href="https://amazon.in" target="_blank" class="decor-card"><div>🌳</div><div style="font-size:11px">Brass Tree</div><span style="color:#4ade80; font-size:12px;">₹1398</span></a>
        </div>

        <h2 class="section-title">Market Tours: <span id="city-title" style="color:var(--primary)">Delhi</span></h2>
        <div id="video-feed"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "YOUR_KEY", authDomain: "YOUR_DOMAIN", projectId: "YOUR_ID", appId: "YOUR_APP" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        function signIn() { auth.signInWithRedirect(provider); }
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-btn').style.display='none';
                document.getElementById('user-info').style.display='flex';
                document.getElementById('user-pic').src = user.photoURL;
                document.getElementById('user-name').innerText = user.displayName.split(" ")[0];
            }
        });

        // --- THE FULL NATIONWIDE DATABASE (V15.0) ---
        const masterDictionary = {
            "delhi": [
                { id: "oxdjZ8nSDOs", platform: "youtube", market: "Banjara Market", finds: [{n: "Mirrors", p: "₹600"}], bargain: "Last bought for ₹500 in March" },
                { id: "wpPnBZOggAE", platform: "youtube", market: "Lajpat Nagar Central", finds: [{n: "Embroidered Fabrics", p: "₹200/m"}], bargain: "Buy in bulk for ₹150/m" },
                { id: "qM5Ycwz8-LA", platform: "youtube", market: "Rajouri Garden", finds: [{n: "Apparel", p: "₹350"}], bargain: "Huge variety for weddings" },
                { id: "_sfG8_xYdZc", platform: "youtube", market: "Chandni Chowk Hidden Gems", finds: [{n: "Antiques", p: "₹1000+"}], bargain: "Street food must try" }
            ],
            "kolkata": [
                { id: "kcjqDg0hmRE", platform: "youtube", market: "Galiff Street Sunday Bazaar", finds: [{n: "Plants", p: "₹100"}, {n: "Pet Supplies", p: "₹250"}], bargain: "Go before 8 AM for best rates" },
                { id: "5pwIPNmxqag", platform: "youtube", market: "New Market (Esplanade)", finds: [{n: "Accessories", p: "₹200"}, {n: "Footwear", p: "₹300"}], bargain: "Summer 2026 Collection live" },
                { id: "V-3bALJOmek", platform: "youtube", market: "Hatibagan Street Shopping", finds: [{n: "Jewelry", p: "₹100"}, {n: "Bags", p: "₹350"}], bargain: "Crazy budget deals here" }
            ],
            "jaipur": [
                { id: "8C7L-2hb4P4", platform: "youtube", market: "Johari Bazaar & Maniharo Ka Rasta", finds: [{n: "Lac Bangles", p: "₹150"}, {n: "Oxidized Jewelry", p: "₹250"}], bargain: "Quotes ₹600, give ₹300" },
                { id: "CJph9WPNMDA", platform: "youtube", market: "LN Textile Jaipur", finds: [{n: "Kurtis", p: "₹450"}], bargain: "Wholesale factory prices" },
                { id: "RIsVxnKn5XE", platform: "youtube", market: "Himachal Woolen Market", finds: [{n: "Sweaters", p: "₹60"}], bargain: "Cheaper than Tibet Market" }
            ],
            "lucknow": [
                { id: "r68AdSRgf4c", platform: "youtube", market: "Hazratganj Ganj-ing", finds: [{n: "Modern Apparel", p: "₹700"}], bargain: "Best for evening strolls" },
                { id: "7BOla3-hyRs", platform: "youtube", market: "Aminabad Holi Spl", finds: [{n: "Chikan Work", p: "₹650"}], bargain: "Festival discounts available" }
            ],
            "varanasi": [
                { id: "WtrAo7gfhs8", platform: "youtube", market: "Varanasi Budget Tour", finds: [{n: "Silk Sarees", p: "₹1500"}], bargain: "Avoid middle-men near Ghats" },
                { id: "nK0_2HZzZ6g", platform: "youtube", market: "Vyom Suits Collection", finds: [{n: "Banarasi Suits", p: "₹500"}], bargain: "Factory direct rates" }
            ],
            "mumbai": [
                { id: "WbY2l_VOigo", platform: "youtube", market: "Crawford Market", finds: [{n: "Decor", p: "₹200"}], bargain: "Bargain hard in electrical lane" },
                { id: "vDAtD6iE1Xo", platform: "youtube", market: "Colaba Causeway", finds: [{n: "Vintage Watches", p: "₹450"}], bargain: "Fixed Price in shops, bargain on street" }
            ],
            "bangalore": [
                { id: "1h_wt99EhXQ", platform: "youtube", market: "Chickpet", finds: [{n: "Silk Sarees", p: "₹1200"}], bargain: "Wholesale hub of South" }
            ],
            "pune": [
                { id: "aGl_H_gGf_o", platform: "youtube", market: "Juna Bazaar", finds: [{n: "Antiques", p: "₹400"}], bargain: "Open only on Wednesday/Sunday" }
            ],
            "patna": [
                { id: "RDfb3o5o6Sc", platform: "youtube", market: "Maurya Lok", finds: [{n: "Handicrafts", p: "₹250"}], bargain: "Fixed government rates" }
            ],
            "bhopal": [
                { id: "rsOPFJebPMg", platform: "youtube", market: "New Market", finds: [{n: "Beadwork", p: "₹200"}], bargain: "Ask for Bhopal specials" }
            ],
            "indore": [
                { id: "7LyTGXM3haU", platform: "youtube", market: "MT Cloth Market", finds: [{n: "Curtains", p: "₹600"}], bargain: "Bulk purchase discounts" }
            ]
        };

        function renderFeed(list) {
            const feed = document.getElementById('video-feed'); feed.innerHTML = "";
            if (!list || list.length === 0) { feed.innerHTML = "<p style='text-align:center;'>Explore another city!</p>"; return; }
            list.forEach(v => {
                const card = document.createElement("div"); card.className = "video-card";
                let media = `<div class="video-wrapper"><iframe src="https://www.youtube.com/embed/${v.id}"></iframe></div>`;
                card.innerHTML = media + 
                    `<div class="product-list"><div style="font-size:10px; color:var(--accent); margin-bottom:8px">MAPPED AT ${v.market.toUpperCase()}</div>` + 
                    v.finds.map(f => `<div class="product-item">✨ ${f.n} <span class="price-tag">${f.p}</span></div>`).join("") + `</div>` +
                    `<div class="bargain-board"><span class="bargain-tag">💡 BARGAIN TIP:</span> ${v.bargain}</div>` +
                    `<div class="action-bar"><button class="icon-btn">☆ Save</button><button class="icon-btn" onclick="window.open('https://wa.me/?text=Check this! https://youtu.be/${v.id}')">📲 Share</button></div>`;
                feed.appendChild(card);
            });
        }

        function handleDropdownChange(val) { document.getElementById('city-title').innerText = val.toUpperCase(); renderFeed(masterDictionary[val]); }
        
        function executeSearch() {
            const term = document.getElementById('market-search').value.toLowerCase().trim();
            if (!term) return;
            let results = [];
            for (const key in masterDictionary) {
                if (key.includes(term) || term.includes(key)) { results = results.concat(masterDictionary[key]); }
            }
            document.getElementById('city-title').innerText = term.toUpperCase();
            renderFeed(results);
        }

        function handleEnter(e) { if(e.key === "Enter") executeSearch(); }
        window.onload = () => renderFeed(masterDictionary["delhi"]);
    </script>
</body>
</html>
