<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarCraft | 2026 Visual Navigator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Poppins:wght@300;400;600&display=swap');
        :root { --primary: #FF7B00; --bg: #050507; --surface: #121217; --border: rgba(255, 255, 255, 0.1); --accent: #FFB703; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background-color: var(--bg); color: white; background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #050507 80%); min-height: 100vh; }
        
        /* High-Visibility Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(5,5,7,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Syncopate', sans-serif; font-size: 16px; color: var(--primary); text-decoration: none; letter-spacing: 2px; }
        .city-picker { background: #1A1A24; color: white; border: 2px solid var(--primary); padding: 8px 12px; border-radius: 12px; font-weight: 700; outline: none; cursor: pointer; }

        .container { max-width: 1200px; margin: 0 auto; padding: 30px 15px 120px; display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 25px; }

        /* Market Card with Working Thumbnails */
        .market-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 28px; padding: 20px; transition: 0.3s; }
        .catalog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .item-card { background: rgba(255,255,255,0.02); border-radius: 18px; padding: 8px; border: 1px solid transparent; cursor: pointer; }
        .item-card:hover { border-color: var(--primary); background: rgba(255,123,0,0.05); }
        
        /* Fixed Thumbnail Engine */
        .thumb-wrapper { width: 100%; height: 100px; border-radius: 12px; overflow: hidden; margin-bottom: 8px; position: relative; background: #111; }
        .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .price-badge { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.8); color: #4ade80; padding: 2px 6px; border-radius: 6px; font-size: 10px; font-weight: 700; }

        .nav-guide { font-size: 11px; color: #4ade80; border: 1px dashed rgba(74, 222, 128, 0.3); padding: 12px; border-radius: 12px; margin-bottom: 15px; }
        .watch-btn { width: 100%; padding: 12px; border-radius: 15px; border: none; background: white; color: black; font-weight: 700; cursor: pointer; }
        .video-box { display: none; margin-top: 15px; border-radius: 15px; overflow: hidden; }

        .budget-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: #1A1A24; padding: 15px 35px; border-radius: 50px; border: 1px solid var(--primary); display: flex; align-items: center; gap: 40px; z-index: 2000; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
    </style>
</head>
<body>
    <header>
        <a href="#" class="logo">BAZAARCRAFT</a>
        <select id="city-selector" class="city-picker" onchange="updateFeed(this.value)">
            <option value="delhi">DELHI</option>
            <option value="mumbai">MUMBAI</option>
            <option value="kolkata">KOLKATA</option>
            <option value="jaipur">JAIPUR</option>
            <option value="lucknow">LUCKNOW</option>
            <option value="varanasi">VARANASI</option>
            <option value="patna">PATNA</option>
            <option value="bhopal">BHOPAL</option>
            <option value="indore">INDORE</option>
            <option value="pune">PUNE</option>
            <option value="bangalore">BANGALORE</option>
        </select>
    </header>

    <div class="container" id="feed"></div>

    <div class="budget-bar">
        <div><span style="font-size:9px; opacity:0.6; display:block;">ESTIMATED CASH</span><span id="total" style="font-size:22px; font-weight:700; color:var(--primary);">₹0</span></div>
        <button onclick="resetTotal()" style="background:none; border:1px solid #444; color:white; padding:8px 15px; border-radius:20px; cursor:pointer; font-size:11px;">RESET</button>
    </div>

    <script>
        let wallet = 0;
        // Updated 2026 Database - Multiple Videos per City
        const masterDB = {
            "delhi": [
                { id: "gVVK5Q6-OG0", m: "Banjara Market", items: [{n: "Mirrors", p: 800}, {n: "Ceramic Vases", p: 150}], nav: "Exit Sector 54 Metro. Rickshaw to 'Gaushala Road'." },
                { id: "tOVVnRnoml0", m: "Chawri Bazaar Hub", items: [{n: "Antique Decor", p: 1200}, {n: "Lighting", p: 600}], nav: "Exit Chawri Bazaar Metro. Gali near Standard Sweets." }
            ],
            "mumbai": [
                { id: "2x-2aqYnjTk", m: "Crawford Market", items: [{n: "Lamps", p: 400}, {n: "Kitchenware", p: 250}], nav: "Lane behind Mahatma Phule Mandai." },
                { id: "FCFaGNH1KaE", m: "Holi Special Hub", items: [{n: "Home Accents", p: 300}], nav: "Central Crawford export lane." }
            ],
            "kolkata": [
                { id: "vxqcwUGuTIU", m: "Gariahat Eid Spl", items: [{n: "Silk Saree", p: 900}, {n: "Oxidized Jewelry", p: 100}], nav: "Stalls near Gariahat Flyover." },
                { id: "2BGTKmSmdgU", m: "Gariahat Summer", items: [{n: "Home Decor", p: 300}], nav: "Opposite Basanti Devi College." }
            ],
            "jaipur": [
                { id: "_Ut-aGpCVaU", m: "Bapu Bazar", items: [{n: "Mojaris", p: 350}, {n: "Handicrafts", p: 500}], nav: "Enter Sanganeri Gate. First left 'Kucha'." },
                { id: "CaFr3YaAPBM", m: "Jaipur Special", items: [{n: "Lac Bangles", p: 150}], nav: "Johari Bazaar inner lanes." }
            ],
            "varanasi": [
                { id: "nVAeSFIGgAE", m: "Silk Market", items: [{n: "Silk Saree", p: 1500}, {n: "Brass Kalash", p: 450}], nav: "Near Godowlia Crossing, old city lanes." }
            ],
            "lucknow": [
                { id: "V_jYSLeCxQ4", m: "Aminabad Hub", items: [{n: "Chikan Kurti", p: 700}], nav: "Pratap Market for high quality." }
            ],
            "patna": [ { id: "tp10ZagNXfA", m: "Maurya Lok", items: [{n: "Litti Craft", p: 100}, {n: "Bamboo Art", p: 250}], nav: "Backside of Patna Museum entrance." } ],
            "bhopal": [ { id: "C6Nv6hl34SE", m: "New Market", items: [{n: "Bead Bag", p: 300}], nav: "Gate No. 2 area." } ],
            "indore": [ { id: "9N--Md7hu0Q", m: "MT Cloth Market", items: [{n: "Curtains", p: 600}], nav: "Near Kanch Ka Mandir lanes." } ],
            "pune": [ { id: "1g3nGOsMH0A", m: "Juna Bazaar", items: [{n: "Antiques", p: 400}], nav: "Footpath stalls near Kesba Peth." } ],
            "bangalore": [ { id: "Tv3gGVG2F38", m: "Chickpet", items: [{n: "Silk", p: 1200}], nav: "Walking tour near police station." } ]
        };

        function render(list) {
            const feed = document.getElementById('feed'); feed.innerHTML = "";
            list.forEach(v => {
                const card = document.createElement('div'); card.className = 'market-card';
                card.innerHTML = `
                    <div style="font-size:10px; color:var(--primary); font-weight:700; margin-bottom:12px;">${v.m.toUpperCase()} CATALOG</div>
                    <div class="catalog-grid">
                        ${v.items.map(i => `
                            <div class="item-card" onclick="add(${i.p})">
                                <div class="thumb-wrapper">
                                    <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" alt="${i.n}">
                                    <span class="price-badge">₹${i.p}</span>
                                </div>
                                <div style="font-size:11px; text-align:center;">${i.n}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="nav-guide">📍 ${v.nav}</div>
                    <button class="watch-btn" onclick="toggle('${v.id}')">WATCH TOUR</button>
                    <div id="${v.id}" class="video-box">
                        <div style="position:relative; padding-bottom:56.25%; height:0;"><iframe src="https://www.youtube.com/embed/${v.id}" style="position:absolute; width:100%; height:100%; border:none;" allowfullscreen></iframe></div>
                    </div>
                `;
                feed.appendChild(card);
            });
        }
        function add(p) { wallet += p; document.getElementById('total').innerText = "₹" + wallet; }
        function resetTotal() { wallet = 0; document.getElementById('total').innerText = "₹0"; }
        function toggle(id) { let box = document.getElementById(id); box.style.display = (box.style.display === 'block') ? 'none' : 'block'; }
        function updateFeed(val) { render(masterDB[val]); }
        window.onload = () => render(masterDB.delhi);
    </script>
</body>
</html>
