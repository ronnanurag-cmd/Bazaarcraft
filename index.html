<!DOCTYPE html>

<style>
@import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Poppins:wght@300;400;600&display=swap');
:root { --primary: #FF7B00; --bg: #050507; --border: rgba(255,255,255,0.1); --accent: #4ade80; }
body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; overflow-x: hidden; padding-bottom: 120px; }
header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(5, 5, 7, 0.95); backdrop-filter: blur(10px); z-index: 1000; }
.logo { color: var(--primary); font-family: 'Syncopate', sans-serif; font-size: 14px; letter-spacing: 2px; text-decoration: none; }
.city-picker { background: #111; color: white; border: 1.5px solid var(--primary); padding: 8px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 12px; outline: none; }
.container { padding: 20px 5%; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; }
.market-card { background: #0f0f13; padding: 20px; border-radius: 28px; border: 1px solid var(--border); transition: 0.3s; position: relative; }
.inventory-summary { background: rgba(255, 255, 255, 0.03); border-radius: 15px; padding: 12px; margin: 10px 0; border-left: 3px solid var(--primary); }
.inventory-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); font-weight: 700; margin-bottom: 5px; }
.inventory-list { font-size: 11px; color: #ccc; line-height: 1.4; }
.nav-tabs { display: flex; gap: 8px; margin: 15px 0; }
.btn { padding: 10px; border-radius: 12px; border: none; cursor: pointer; font-size: 11px; font-weight: 700; flex: 1; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; color: white; }
.maps { background: #4285F4; } .uber { background: black; border: 1px solid #333; } .whatsapp { background: #25D366; color: black; }
.catalog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
.item-card { background: #1a1a1a; padding: 10px; border-radius: 18px; position: relative; }
.item-thumb { width: 100%; height: 90px; object-fit: cover; border-radius: 12px; margin-bottom: 5px; }
.wish-btn { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); border: none; color: var(--primary); border-radius: 50%; width: 28px; height: 28px; cursor: pointer; z-index: 10; }
.offline-fab { position: fixed; right: 25px; bottom: 100px; background: var(--primary); border: none; color: white; width: 65px; height: 65px; border-radius: 50%; font-size: 26px; cursor: pointer; z-index: 2001; box-shadow: 0 8px 25px rgba(255,123,0,0.5); }
.offline-modal { position: fixed; bottom: -100%; left: 0; width: 100%; background: #0a0a0c; border-top: 4px solid var(--primary); padding: 30px; border-radius: 35px 35px 0 0; z-index: 3000; transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); max-height: 85vh; overflow-y: auto; }
.offline-modal.open { bottom: 0; }
.budget-box { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: #111; padding: 15px 30px; border-radius: 50px; border: 1px solid var(--primary); z-index: 2000; display: flex; align-items: center; gap: 25px; width: 85%; max-width: 350px; justify-content: center; }
.video-box { display: none; margin-top: 15px; border-radius: 18px; overflow: hidden; border: 1px solid var(--border); }
</style>
</head>

</header>

<div class="container" id="feed"></div>
<button class="offline-fab" onclick="toggleOffline()">📝</button>

<div class="offline-modal" id="offline-modal">

        <button onclick="toggleOffline()" style="background:none; border:none; color:white; font-size:28px;">✕</button>
    </div>
    <div id="offline-content"></div>
    <button onclick="exportPDF()" style="width:100%; background:var(--primary); border:none; color:white; padding:20px; border-radius:20px; font-weight:700; cursor:pointer; font-size:15px; margin-top:20px;">📄 DOWNLOAD PDF</button>
</div>

<div class="budget-box">
    <span style="font-size:15px;">TOTAL: <span id="total" style="color:var(--primary); font-weight:700;">₹0</span></span>
    <button onclick="resetTotal()" style="background:none; border:1px solid #444; color:white; padding:6px 15px; border-radius:12px; cursor:pointer; font-size:11px; margin-left:15px;">RESET</button>
</div>

<script>

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let wallet = 0, wishlist = [], currentCity = "delhi", currentUser = null;

// --- 2. AUTH ---
function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
function logout() { if(confirm("Logout?")) auth.signOut().then(() => location.reload()); }
auth.onAuthStateChanged(user => {
    if (user) {
        currentUser = user; document.getElementById('login-btn').style.display = 'none';
        document.getElementById('user-img').src = user.photoURL; document.getElementById('user-img').style.display = 'block';
        db.collection("users").doc(user.uid).get().then(doc => { if(doc.exists) { wishlist = doc.data().wishlist || []; renderWishlist(); } });
    }
});

    "jaipur": [{id:"_Ut-aGpCVaU", m:"Bapu Bazar", lat:"26.91", lng:"75.82", items:[{n:"Quilt", p:1500},{n:"Juttis", p:400}], nav:"Sanganeri Gate"}, {id:"kCdTLhyzl8A", m:"Johari Bazaar", lat:"26.92", lng:"75.82", items:[{n:"Silver Ring", p:600}], nav:"Hawa Mahal"}],
    "kolkata": [{id:"vxqcwUGuTIU", m:"Gariahat", lat:"22.51", lng:"88.36", items:[{n:"Tant Saree", p:1000}], nav:"Crossing"}, {id:"2BGTKmSmdgU", m:"New Market", lat:"22.56", lng:"88.35", items:[{n:"Leather", p:1500}], nav:"Lindsay St"}],
    "varanasi": [{id:"nVAeSFIGgAE", m:"Thatheri Bazaar", lat:"25.31", lng:"82.99", items:[{n:"Brass Idol", p:800}], nav:"Chowk"}, {id:"Rf1IHg85_TQ", m:"Vishwanath Galli", lat:"25.31", lng:"83.01", items:[{n:"Silk", p:2800}], nav:"Temple Lane"}],

};

// --- 4. ENGINE ---
function render(data) {
    const feed = document.getElementById("feed"); feed.innerHTML = "";
    data.forEach(v => {
        let maps = `http://googleusercontent.com/maps.google.com/search?api=1&query=${v.lat},${v.lng}`;
        let uber = `https://m.uber.com/ul/?action=setPickup&dropoff[latitude]=${v.lat}&dropoff[longitude]=${v.lng}`;
        const synopsis = v.items.map(i => `${i.n} (₹${i.p})`).join(", ");
        feed.innerHTML += `
        <div class="market-card">
            <h3 style="color:var(--primary); margin:0 0 10px 0; font-size:16px;">${v.m.toUpperCase()}</h3>
            <div class="inventory-summary"><div class="inventory-title">Quick Inventory:</div><div class="inventory-list">${synopsis}</div></div>
            <div class="nav-tabs"><a href="${maps}" target="_blank" class="btn maps">MAPS</a><a href="${uber}" target="_blank" class="btn uber">UBER</a></div>
            <div class="catalog-grid">
                ${v.items.map(i => `
                <div class="item-card">
                    <button class="wish-btn" onclick="saveToWishlist('${i.n}', ${i.p}, '${v.m}', '${v.nav}')">♥</button>
                    <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" class="item-thumb">
                    <div style="font-size:10px; margin-top:5px; text-align:center;" onclick="add(${i.p})">${i.n} <span style="color:var(--accent);">₹${i.p}</span></div>
                </div>`).join("")}
            </div>
            <div style="font-size:11px; opacity:0.8; margin-top:10px;">📍 ${v.nav}</div>
            <button onclick="toggleVid('${v.id}')" style="width:100%; padding:12px; border-radius:15px; border:1px solid #333; background:none; color:white; font-size:11px; margin-top:12px; cursor:pointer;">🎥 WATCH VIDEO TOUR</button>
            <div id="${v.id}" class="video-box"><iframe width="100%" height="220" src="https://www.youtube.com/embed/${v.id}" frameborder="0" allowfullscreen></iframe></div>
        </div>`;
    });
}
function saveToWishlist(name, price, market, nav) { wishlist.push({name, price, market, nav}); if(currentUser) db.collection("users").doc(currentUser.uid).set({ wishlist: wishlist }); renderWishlist(); }
function renderWishlist() { const box = document.getElementById("offline-content"); box.innerHTML = wishlist.length ? "" : "<p style='opacity:0.4; text-align:center;'>No items saved.</p>"; wishlist.forEach((i, idx) => box.innerHTML += `<div style="border-bottom:1px solid #222; padding:12px 0; font-size:12px; display:flex; justify-content:space-between;"><span>${idx+1}. ${i.name}</span> <span style="color:var(--primary);">₹${i.price}</span></div>`); }
function toggleOffline() { document.getElementById("offline-modal").classList.toggle("open"); }
function updateCity(c) { currentCity = c; render(masterDB[c]); }
function add(p) { wallet += p; document.getElementById("total").innerText = "₹" + wallet; }
function resetTotal() { wallet = 0; document.getElementById("total").innerText = "₹0"; }
function toggleVid(id) { let el = document.getElementById(id); el.style.display = el.style.display === "block" ? "none" : "block"; }
function exportPDF() { const { jsPDF } = window.jspdf; const doc = new jsPDF(); doc.text("BazaarCraft Offline Trip Guide", 20, 20); let y = 40; wishlist.forEach((item, index) => { doc.text(`${index+1}. ${item.name} (₹${item.price}) - ${item.market}`, 20, y); y += 15; }); doc.save("BazaarCraft_Trip.pdf"); }
updateCity("delhi");
</script>
</body>
</html>
