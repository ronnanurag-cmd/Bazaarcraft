<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarCraft | India's Local Market Hub</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        :root {
            --primary: #FF7B00; 
            --bg-base: #0B0B0F; 
            --surface: #1A1A24; 
            --text-main: #FFFFFF;
            --text-muted: #A0A0B0;
            --accent: #FFB703;
            --ig-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        body {
            margin: 0; font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-base); color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 15px; background-color: rgba(11, 11, 15, 0.9);
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo {
            font-size: 20px; font-weight: 700;
            background: linear-gradient(45deg, #FF7B00, #FFB703);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .header-right { display: flex; align-items: center; gap: 10px; }

        .login-btn {
            background: var(--primary); color: white; border: none; padding: 6px 14px;
            border-radius: 12px; font-size: 11px; font-weight: 600; cursor: pointer;
        }

        .user-profile { display: none; align-items: center; gap: 8px; }
        .profile-pic { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--primary); }

        .hero {
            text-align: center; padding: 50px 20px 30px;
            background: radial-gradient(circle at top, rgba(255, 123, 0, 0.1) 0%, transparent 70%);
        }

        .quote { font-size: 1.6rem; font-weight: 300; font-style: italic; color: var(--accent); margin-bottom: 20px; }

        .search-container {
            display: flex; max-width: 450px; margin: 0 auto;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px; padding: 4px;
        }

        .search-input { flex: 1; background: transparent; border: none; padding: 10px 20px; color: white; outline: none; }
        .search-btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: 600; cursor: pointer; }

        .container { max-width: 600px; margin: 0 auto; padding: 0 20px 60px; }

        .section-title {
            font-size: 1.4rem; margin-bottom: 25px; color: var(--text-main); font-weight: 600;
            border-left: 4px solid var(--primary); padding-left: 15px;
        }

        /* --- New Curated Decor Section --- */
        .curated-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 40px;
        }

        .curated-card {
            background: var(--surface); border-radius: 15px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05); text-decoration: none; color: inherit;
            transition: transform 0.2s;
        }

        .curated-card:hover { transform: translateY(-3px); border-color: var(--primary); }

        .curated-img { width: 100%; height: 120px; object-fit: cover; background: #222; }
        .curated-info { padding: 12px; }
        .curated-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; display: block; }
        .curated-price { font-size: 12px; color: #4ade80; font-weight: 700; }

        .video-card {
            background: var(--surface); border-radius: 20px; overflow: hidden;
            margin-bottom: 40px; border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .video-wrapper.youtube { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-wrapper.youtube iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .action-bar { display: flex; justify-content: space-between; padding: 12px 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        .icon-btn { background: transparent; border: none; color: var(--text-muted); font-size: 12px; cursor: pointer; }
        .icon-btn.saved { color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">BazaarCraft</a>
        <div class="header-right">
            <select id="city-selector" class="location-dropdown" onchange="handleDropdownChange(this.value)">
                <option value="delhi">Delhi</option>
                <option value="mumbai">Mumbai</option>
                <option value="jaipur">Jaipur</option>
            </select>
            <button id="login-btn" class="login-btn" onclick="signIn()">Login</button>
            <div id="user-info" class="user-profile">
                <img id="user-pic" class="profile-pic" src="" alt="">
                <span id="user-name" style="font-size: 11px; cursor:pointer;" onclick="showBookmarks()">Saves</span>
                <button class="icon-btn" onclick="signOut()" style="color:var(--primary)">Logout</button>
            </div>
        </div>
    </header>

    <div class="hero">
        <h1 class="quote">"True aesthetic is hidden in our galis."</h1>
        <div class="search-container">
            <input type="text" id="market-search" class="search-input" placeholder="Search markets or items..." onkeypress="handleEnter(event)">
            <button class="search-btn" onclick="executeSearch()">Search</button>
        </div>
    </div>

    <div class="container">
        <h2 class="section-title">Shop Curated Decor</h2>
        <div class="curated-grid">
            <a href="https://amzn.to/example1" target="_blank" class="curated-card">
                <div class="curated-img" style="display:flex;align-items:center;justify-content:center;font-size:30px">🏺</div>
                <div class="curated-info">
                    <span class="curated-name">Artificial Plants</span>
                    <span class="curated-price">₹299</span>
                </div>
            </a>
            <a href="https://amzn.to/example2" target="_blank" class="curated-card">
                <div class="curated-img" style="display:flex;align-items:center;justify-content:center;font-size:30px">✨</div>
                <div class="curated-info">
                    <span class="curated-name">Leaf Shape Stand</span>
                    <span class="curated-price">₹186</span>
                </div>
            </a>
        </div>

        <h2 class="section-title">Viewing: <span id="video-city-title" style="color: var(--primary);">Trending</span></h2>
        <div id="video-feed"></div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        function signIn() { auth.signInWithRedirect(provider); }
        function signOut() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            const loginBtn = document.getElementById('login-btn');
            const userInfo = document.getElementById('user-info');
            if (user) {
                loginBtn.style.display = 'none'; userInfo.style.display = 'flex';
                document.getElementById('user-pic').src = user.photoURL;
                document.getElementById('user-name').innerText = user.displayName.split(" ")[0];
            } else {
                loginBtn.style.display = 'block'; userInfo.style.display = 'none';
            }
        });

        const masterDictionary = {
            "delhi": [{ id: "oxdjZ8nSDOs", platform: "youtube", market: "Banjara Market", topFinds: [{name: "Vases", price: "₹150", img: "🏺"}] }],
            "jaipur": [{ id: "nE5C9KvIqRQ", platform: "youtube", market: "Johari Bazaar", topFinds: [{name: "Jewelry", price: "₹300", img: "💍"}] }]
        };

        function renderFeed(videoList) {
            const feed = document.getElementById('video-feed');
            feed.innerHTML = "";
            if (!videoList) return;
            videoList.forEach(video => {
                const card = document.createElement("div");
                card.className = "video-card";
                card.innerHTML = `
                    <div class="video-wrapper youtube"><iframe src="https://www.youtube.com/embed/${video.id}"></iframe></div>
                    <div class="action-bar">
                        <button class="icon-btn" onclick="toggleSave('${video.id}', this)">☆ Save</button>
                        <button class="icon-btn" onclick="window.open('https://api.whatsapp.com/send?text=Check this! https://youtu.be/${video.id}')">📲 Share</button>
                    </div>`;
                feed.appendChild(card);
            });
        }

        function executeSearch() {
            const term = document.getElementById('market-search').value.toLowerCase().trim();
            renderFeed(masterDictionary[term] || []);
        }

        function handleEnter(e) { if (e.key === "Enter") executeSearch(); }
        function handleDropdownChange(val) { renderFeed(masterDictionary[val]); }

        window.onload = () => renderFeed(masterDictionary["delhi"]);
    </script>
</body>
</html>
