<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarCraft | India's Local Market Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        :root {
            --primary: #FF7B00; 
            --bg-base: #0B0B0F; 
            --surface: #1A1A24; 
            --text-main: #FFFFFF;
            --text-muted: #A0A0B0;
            --accent: #FFB703;
            --ig-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            --fb-color: #1877F2;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-base);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* Header Layout */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 15px;
            background-color: rgba(11, 11, 15, 0.9);
            backdrop-filter: blur(15px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(45deg, #FF7B00, #FFB703);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Modern Small Dropdown */
        select.location-dropdown {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 5px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-family: 'Poppins', sans-serif;
            outline: none;
        }

        .login-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-btn:active { transform: scale(0.95); }

        /* Hero & Search */
        .hero {
            text-align: center;
            padding: 40px 20px 20px;
            background: radial-gradient(circle at top, rgba(255, 123, 0, 0.1) 0%, transparent 70%);
        }

        .quote {
            font-size: 1.4rem;
            font-weight: 300;
            font-style: italic;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .search-container {
            display: flex;
            max-width: 450px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 4px;
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 15px;
            color: white;
            font-family: 'Poppins', sans-serif;
            outline: none;
        }

        .search-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        /* Feed Styling */
        .container {
            max-width: 550px; 
            margin: 0 auto;
            padding: 20px 15px 60px;
        }

        .section-title {
            font-size: 1.2rem;
            margin-bottom: 20px;
            border-left: 3px solid var(--primary);
            padding-left: 10px;
        }

        .video-card {
            background: var(--surface);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .video-wrapper.youtube {
            position: relative; padding-bottom: 56.25%; height: 0;
        }

        .video-wrapper iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
        }

        /* Native App Link Cards */
        .native-link-card {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px 20px; text-decoration: none; color: white;
        }

        .native-link-card.instagram { background: var(--ig-gradient); }
        .native-link-card.facebook { background: var(--fb-color); }

        .play-icon {
            font-size: 30px; margin-bottom: 10px; background: rgba(255,255,255,0.2);
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
        }

        /* Product Breakdown */
        .product-list { padding: 15px; background: rgba(0,0,0,0.2); }
        .product-list-title { font-size: 11px; color: var(--accent); margin-bottom: 10px; font-weight: 600; letter-spacing: 1px; }
        
        .product-item {
            display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
        }

        .product-info h5 { margin: 0; font-size: 13px; }
        .product-info p { margin: 0; font-size: 10px; color: var(--text-muted); }
        .price-chip { margin-left: auto; color: #4ade80; font-weight: 700; font-size: 12px; }

        .action-bar {
            display: flex; justify-content: space-between; padding: 10px 15px; border-top: 1px solid rgba(255,255,255,0.05);
        }

        .icon-btn { background: transparent; border: none; color: var(--text-muted); font-size: 11px; cursor: pointer; }
        .icon-btn.saved { color: var(--primary); }

    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">BazaarCraft</a>
        <div class="header-right">
            <select id="city-selector" class="location-dropdown" onchange="handleDropdownChange(this.value)">
                <option value="delhi">Delhi</option>
                <option value="mumbai">Mumbai</option>
                <option value="bangalore">Bangalore</option>
                <option value="pune">Pune</option>
                <option value="jaipur">Jaipur</option>
                <option value="lucknow">Lucknow</option>
                <option value="bhopal">Bhopal</option>
                <option value="patna">Patna</option>
            </select>
            <button class="login-btn" onclick="handleLogin()">Login</button>
        </div>
    </header>

    <div class="hero">
        <h1 class="quote">"True aesthetic is hidden in our galis."</h1>
        <div class="search-container">
            <input type="text" id="market-search" class="search-input" placeholder="Search Banjara, Brass..." onkeypress="handleEnter(event)">
            <button class="search-btn" onclick="executeSearch()">Go</button>
        </div>
    </div>

    <div class="container">
        <h2 class="section-title">Viewing: <span id="video-city-title" style="color: var(--primary);">Delhi</span></h2>
        <div id="video-feed"></div>
    </div>

    <script>
        // EXPANDED: Added back Tier 2/3 cities into the dictionary
        const masterDictionary = {
            "delhi": [
                { id: "oxdjZ8nSDOs", platform: "youtube", market: "Banjara Market", topFinds: [{name: "Ceramic Pots", price: "₹150", shop: "Lanes 1-2", img: "🏺"}] },
                { id: "CwhA2uJovXg", platform: "instagram", market: "Dilli Haat", topFinds: [{name: "Mirrors", price: "₹600", shop: "Artisans Row", img: "🪞"}] }
            ],
            "mumbai": [{ id: "WbY2l_VOigo", platform: "youtube", market: "Crawford Market", topFinds: [{name: "Lanterns", price: "₹200", shop: "Main Lane", img: "🏮"}] }],
            "jaipur": [{ id: "nE5C9KvIqRQ", platform: "youtube", market: "Johari Bazaar", topFinds: [{name: "Rings", price: "₹300", shop: "Street Vendors", img: "💍"}] }],
            "lucknow": [{ id: "8TWLIsL6fXM", platform: "youtube", market: "Aminabad", topFinds: [{name: "Furniture", price: "₹2000", shop: "Naka Hindola", img: "🪑"}] }],
            "bhopal": [{ id: "rsOPFJebPMg", platform: "youtube", market: "New Market", topFinds: [{name: "Wall Art", price: "₹400", shop: "Art Lane", img: "🖼️"}] }],
            "patna": [{ id: "RDfb3o5o6Sc", platform: "youtube", market: "Maurya Lok", topFinds: [{name: "Handicrafts", price: "₹250", shop: "Bazaar Road", img: "🎨"}] }]
        };

        function renderFeed(videoList) {
            const feed = document.getElementById('video-feed');
            feed.innerHTML = "";
            const saved = JSON.parse(localStorage.getItem('bazaarSavesV6') || "[]");

            if (!videoList || videoList.length === 0) {
                feed.innerHTML = "<p style='text-align:center; color:var(--text-muted)'>No results found. Try a different city!</p>";
                return;
            }

            videoList.forEach(video => {
                const card = document.createElement("div");
                card.className = "video-card";
                
                let media = "";
                if (video.platform === "youtube") {
                    media = `<div class="video-wrapper youtube"><iframe src="https://www.youtube.com/embed/${video.id}"></iframe></div>`;
                } else {
                    const url = video.platform === "instagram" ? `https://www.instagram.com/reels/${video.id}/` : `https://www.facebook.com/watch/?v=${video.id}`;
                    media = `<a href="${url}" target="_blank" class="native-link-card ${video.platform}"><div class="play-icon">▶</div><p style="font-size:12px;font-weight:700">Open in ${video.platform.toUpperCase()}</p></a>`;
                }

                let products = `<div class="product-list"><div class="product-list-title">Top Picks: ${video.market}</div>`;
                video.topFinds.forEach(item => {
                    products += `<div class="product-item"><span>${item.img}</span><div class="product-info"><h5>${item.name}</h5><p>${item.shop}</p></div><div class="price-chip">${item.price}</div></div>`;
                });
                products += `</div>`;

                const isSaved = saved.includes(video.id);
                const actions = `<div class="action-bar"><button class="icon-btn ${isSaved ? 'saved' : ''}" onclick="toggleSave('${video.id}', this)">${isSaved ? '★ Saved' : '☆ Save'}</button><button class="icon-btn" onclick="shareVideo('${video.id}')">📲 Share</button></div>`;

                card.innerHTML = media + products + actions;
                feed.appendChild(card);
            });
        }

        function toggleSave(id, btn) {
            let saved = JSON.parse(localStorage.getItem('bazaarSavesV6') || "[]");
            if (saved.includes(id)) {
                saved = saved.filter(i => i !== id);
                btn.classList.remove('saved'); btn.innerText = "☆ Save";
            } else {
                saved.push(id);
                btn.classList.add('saved'); btn.innerText = "★ Saved";
            }
            localStorage.setItem('bazaarSavesV6', JSON.stringify(saved));
        }

        function handleLogin() {
            const userChoice = confirm("Would you like to log in with Google to sync your saved markets across all devices?");
            if (userChoice) {
                alert("Login service is now connecting to Firebase... Your session will start soon!");
            }
        }

        function shareVideo(id) {
            window.open(`https://api.whatsapp.com/send?text=Look at this BazaarCraft find! https://youtu.be/${id}`);
        }

        function handleDropdownChange(val) {
            document.getElementById('video-city-title').innerText = val.charAt(0).toUpperCase() + val.slice(1);
            renderFeed(masterDictionary[val]);
        }

        function executeSearch() {
            const term = document.getElementById('market-search').value.toLowerCase().trim();
            if (!term) return;
            renderFeed(masterDictionary[term] || []);
        }

        function handleEnter(e) { if (e.key === "Enter") executeSearch(); }

        window.onload = () => renderFeed(masterDictionary["delhi"]);
    </script>
</body>
</html>
