:root {
  --primary: #FF7B00;
  --bg: #050507;
  --card: #0f0f13;
  --border: rgba(255,255,255,0.1);
  --accent: #4ade80;
}

* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: white;
  overflow-x: hidden;
  padding-bottom: 120px;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 5%;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: rgba(5, 5, 7, 0.95);
  backdrop-filter: blur(10px);
  z-index: 1000;
}

.logo {
  color: var(--primary);
  font-family: 'Syncopate', sans-serif;
  font-size: 14px;
  letter-spacing: 2px;
  text-decoration: none;
}

.city-picker {
  background: #111;
  color: white;
  border: 1.5px solid var(--primary);
  padding: 8px;
  border-radius: 12px;
  font-weight: 700;
  cursor: pointer;
  font-size: 12px;
  outline: none;
}

.container {
  padding: 20px 5%;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 25px;
}

.market-card {
  background: var(--card);
  padding: 20px;
  border-radius: 28px;
  border: 1px solid var(--border);
  transition: 0.3s;
  position: relative;
}

.market-card:hover { border-color: var(--primary); }

.inventory-summary {
  background: rgba(255, 255, 255, 0.03);
  border-radius: 15px;
  padding: 12px;
  margin: 10px 0;
  border-left: 3px solid var(--primary);
}

.inventory-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--primary);
  font-weight: 700;
  margin-bottom: 5px;
}

.inventory-list {
  font-size: 11px;
  color: #ccc;
  line-height: 1.4;
}

.nav-tabs {
  display: flex;
  gap: 8px;
  margin: 15px 0;
}

.btn {
  padding: 10px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-size: 11px;
  font-weight: 700;
  flex: 1;
  text-align: center;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

.maps { background: #4285F4; }
.uber { background: black; border: 1px solid #333; }
.whatsapp { background: #25D366; color: black; }

.catalog-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 15px 0;
}

.item-card {
  background: #1a1a1a;
  padding: 10px;
  border-radius: 18px;
  position: relative;
  border: 1px solid transparent;
}

.item-card:hover { border-color: var(--primary); }

.item-thumb {
  width: 100%;
  height: 90px;
  object-fit: cover;
  border-radius: 12px;
  margin-bottom: 5px;
}

.wish-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(0,0,0,0.7);
  border: none;
  color: var(--primary);
  border-radius: 50%;
  width: 28px;
  height: 28px;
  cursor: pointer;
  z-index: 10;
  font-size: 15px;
}

.offline-fab {
  position: fixed;
  right: 25px;
  bottom: 100px;
  background: var(--primary);
  border: none;
  color: white;
  width: 65px;
  height: 65px;
  border-radius: 50%;
  font-size: 26px;
  cursor: pointer;
  z-index: 2001;
  box-shadow: 0 8px 25px rgba(255,123,0,0.5);
}

.offline-modal {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  background: #0a0a0c;
  border-top: 4px solid var(--primary);
  padding: 30px;
  border-radius: 35px 35px 0 0;
  z-index: 3000;
  transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
  max-height: 85vh;
  overflow-y: auto;
}

.offline-modal.open { bottom: 0; }

.budget-box {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  padding: 15px 30px;
  border-radius: 50px;
  border: 1px solid var(--primary);
  z-index: 2000;
  display: flex;
  align-items: center;
  gap: 25px;
  width: 85%;
  max-width: 350px;
  justify-content: center;
}

.video-box {
  display: none;
  margin-top: 15px;
  border-radius: 18px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.login-btn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 700;
  font-size: 11px;
}

.profile-img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid var(--primary);
  display: none;
  cursor: pointer;
}

@media (max-width: 768px) {
  .container { grid-template-columns: 1fr; }
  header { gap: 10px; }
  .logo { font-size: 12px; }
  .city-picker { max-width: 150px; }
}
</style>
</head>

function render(data) {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  data.forEach(v => {
    const maps = `https://www.google.com/maps/search/?api=1&query=${v.lat},${v.lng}`;
    const uber = `https://m.uber.com/ul/?action=setPickup&dropoff[latitude]=${v.lat}&dropoff[longitude]=${v.lng}`;
    const whatsappText = encodeURIComponent(`I'm visiting ${v.m}. Route note: ${v.nav}`);
    const whatsapp = `https://wa.me/?text=${whatsappText}`;
    const synopsis = v.items.map(i => `${i.n} (₹${i.p})`).join(", ");

    feed.innerHTML += `
      <div class="market-card">
        <h3 style="color:var(--primary); margin:0 0 10px 0; font-size:16px; letter-spacing:1px;">${v.m.toUpperCase()}</h3>

        <div class="inventory-summary">
          <div class="inventory-title">Quick Inventory:</div>
          <div class="inventory-list">${synopsis}</div>
        </div>

        <div class="nav-tabs">
          <a href="${maps}" target="_blank" class="btn maps">MAPS</a>
          <a href="${uber}" target="_blank" class="btn uber">UBER</a>
          <a href="${whatsapp}" target="_blank" class="btn whatsapp">SHARE</a>
        </div>

        <div class="catalog-grid">
          ${v.items.map(i => `
            <div class="item-card">
              <button class="wish-btn" onclick="saveToWishlist('${i.n.replace(/'/g, "\\'")}', ${i.p}, '${v.m.replace(/'/g, "\\'")}', '${v.nav.replace(/'/g, "\\'")}')">♥</button>
              <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" class="item-thumb" onerror="this.src='https://via.placeholder.com/300x180?text=Market+View'">
              <div style="font-size:10px; margin-top:5px; text-align:center; cursor:pointer;" onclick="add(${i.p})">
                ${i.n}
                <span style="color:var(--accent); display:block; font-weight:700;">₹${i.p}</span>
              </div>
            </div>
          `).join("")}
        </div>

        <div style="font-size:11px; opacity:0.8; margin-top:10px;">📍 ${v.nav}</div>

        <button onclick="toggleVid('${v.id}')" style="width:100%; padding:12px; border-radius:15px; border:1px solid #333; background:none; color:white; font-size:11px; margin-top:12px; cursor:pointer; font-weight:600;">🎥 WATCH VIDEO TOUR</button>
        <div id="${v.id}" class="video-box">
          <iframe width="100%" height="220" src="https://www.youtube.com/embed/${v.id}" frameborder="0" allowfullscreen></iframe>
        </div>
      </div>
    `;
  });
}

function saveToWishlist(name, price, market, nav) {
  wishlist.push({ name, price, market, nav });
  if (currentUser) {
    db.collection("users").doc(currentUser.uid).set({ wishlist: wishlist });
  }
  renderWishlist();
}

function renderWishlist() {
  const box = document.getElementById("offline-content");
  box.innerHTML = wishlist.length ? "" : "<p style='opacity:0.4; text-align:center;'>No items saved.</p>";
  wishlist.forEach((i, idx) => {
    box.innerHTML += `
      <div style="border-bottom:1px solid #222; padding:12px 0; font-size:12px; display:flex; justify-content:space-between; gap:10px;">
        <span>${idx + 1}. ${i.name} <br><small style="opacity:0.6;">${i.market}</small></span>
        <span style="color:var(--primary); white-space:nowrap;">₹${i.price}</span>
      </div>
    `;
  });
}

function toggleOffline() {
  document.getElementById("offline-modal").classList.toggle("open");
}

function updateCity(c) {
  currentCity = c;
  render(masterDB[c] || []);
}

function add(p) {
  wallet += p;
  document.getElementById("total").innerText = "₹" + wallet;
}

function resetTotal() {
  wallet = 0;
  document.getElementById("total").innerText = "₹0";
}

function toggleVid(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === "block" ? "none" : "block";
}

function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(18);
  doc.text("BazaarCraft Offline Trip Guide", 20, 20);
  doc.setFontSize(12);
  let y = 35;

  if (!wishlist.length) {
    doc.text("No saved items yet.", 20, y);
  } else {
    wishlist.forEach((item, index) => {
      doc.text(`${index + 1}. ${item.name} (₹${item.price}) - ${item.market}`, 20, y);
      y += 10;
      if (y > 270) {
        doc.addPage();
        y = 20;
      }
    });
  }

  doc.save("BazaarCraft_Trip.pdf");
}

updateCity("delhi");
</script>
