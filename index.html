<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarCraft | Premium Market Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Poppins:wght@300;400;600&display=swap');
        
        :root {
            --primary: #FF7B00; --bg: #050507; --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1); --accent: #FFB703;
        }

        body { 
            margin: 0; font-family: 'Poppins', sans-serif; background-color: var(--bg); color: white;
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #050507 80%);
            min-height: 100vh;
        }

        /* Ticker Bar */
        .pulse-bar { 
            background: #111; color: var(--accent); font-size: 11px; padding: 6px; 
            text-align: center; border-bottom: 1px solid var(--border); overflow: hidden;
        }
        .ticker { display: inline-block; animation: scroll 25s linear infinite; white-space: nowrap; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-family: 'Syncopate', sans-serif; font-size: 18px; letter-spacing: 2px; color: var(--primary); text-decoration: none; }

        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }

        /* Market Card 2.0 */
        .market-card {
            background: var(--glass); border: 1px solid var(--border); border-radius: 28px;
            padding: 25px; backdrop-filter: blur(10px); transition: 0.4s ease;
        }
        .market-card:hover { border-color: var(--primary); transform: translateY(-5px); }

        .item-chip {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; margin: 8px 0; background: rgba(255,255,255,0.02);
            border-radius: 12px; cursor: pointer; border: 1px solid transparent;
        }
        .item-chip:hover { border-color: #4ade80; background: rgba(74, 222, 128, 0.05); }
        .price { color: #4ade80; font-weight: 700; }

        .video-box { display: none; margin-top: 20px; border-radius: 15px; overflow: hidden; }

        /* Sticky Intelligence Bar */
        .intel-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(20px);
            padding: 15px 30px; border-radius: 50px; border: 1px solid var(--primary);
            display: flex; align-items: center; gap: 40px; z-index: 2000; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div class="pulse-bar">
        <div class="ticker">🔥 MARKET PULSE: Varanasi Brass UP (+5%) | Delhi Banjara: Police checking today, avoid Gali 1 | Jaipur: Blue Pottery stock refreshed!</div>
    </div>

    <header>
        <a href="#" class="logo">BAZAARCRAFT</a>
        <select id="city-selector" onchange="updateFeed(this.value)" style="background:none; color:white; border:none; font-weight:700; cursor:pointer;">
            <option value="delhi">DELHI</option>
            <option value="mumbai">MUMBAI</option>
            <option value="kolkata">KOLKATA</option>
            <option value="jaipur">JAIPUR</option>
            <option value="lucknow">LUCKNOW</option>
            <option value="varanasi">VARANASI</option>
            <option value="patna">PATNA</option>
            <option value="bhopal">BHOPAL</option>
            <option value="indore">INDORE</option>
            <option value="pune">PUNE</option>
            <option value="bangalore">BANGALORE</option>
        </select>
    </header>

    <div class="container" id="feed"></div>

    <div class="intel-bar">
        <div>
            <span style="font-size:10px; opacity:0.6; display:block;">CASH TO CARRY</span>
            <span id="budget" style="font-size:22px; font-weight:700; color:var(--primary);">₹0</span>
        </div>
        <button onclick="resetBudget()" style="background:none; border:1px solid #333; color:white; padding:8px 15px; border-radius:20px; cursor:pointer; font-size:11px;">RESET</button>
    </div>

    <script>
        let wallet = 0;
        const database = {
            "delhi": [
                { id: "oxdjZ8nSDOs", m: "Banjara Market", items: [{n: "Big Mirror", p: 800}, {n: "Ceramic Pot", p: 200}], tip: "Bargain starts at 3x price." },
                { id: "wpPnBZOggAE", m: "Lajpat Nagar", items: [{n: "Designer Suits", p: 1200}], tip: "Monday is for clearance." }
            ],
            "kolkata": [{ id: "kcjqDg0hmRE", m: "Galiff Street", items: [{n: "Rare Plants", p: 150}], tip: "Early morning only." }],
            "jaipur": [{ id: "kCdTLhyzl8A", m: "Bapu Bazaar", items: [{n: "Mojaris", p: 350}], tip: "Inner lanes are cheaper." }],
            "varanasi": [{ id: "Rf1IHg85_TQ", m: "Thatheri Bazaar", items: [{n: "Brass Idol", p: 500}], tip: "Pure brass is heavy." }],
            "mumbai": [{ id: "WbY2l_VOigo", m: "Crawford", items: [{n: "Kitchenware", p: 150}], tip: "Wholesale only." }],
            "lucknow": [{ id: "8TWLIsL6fXM", m: "Aminabad", items: [{n: "Chikan Kurti", p: 700}], tip: "Verify handwork." }],
            "patna": [{ id: "RDfb3o5o6Sc", m: "Maurya Lok", items: [{n: "Handicrafts", p: 250}], tip: "Fixed Govt rates." }],
            "bhopal": [{ id: "rsOPFJebPMg", m: "New Market", items: [{n: "Zardosi", p: 500}], tip: "Ask for local Batua." }],
            "indore": [{ id: "7LyTGXM3haU", m: "MT Cloth Market", items: [{n: "Fabric", p: 400}], tip: "Wholesale hub." }],
            "pune": [{ id: "aGl_H_gGf_o", m: "Juna Bazaar", items: [{n: "Antiques", p: 400}], tip: "Wednesday/Sunday." }],
            "bangalore": [{ id: "1h_wt99EhXQ", m: "Chickpet", items: [{n: "Silk Sarees", p: 1200}], tip: "Great for weddings." }]
        };

        function render(list) {
            const feed = document.getElementById('feed'); feed.innerHTML = "";
            list.forEach(v => {
                const card = document.createElement('div'); card.className = 'market-card';
                card.innerHTML = `
                    <div style="font-size:10px; color:var(--accent); margin-bottom:10px; font-weight:700;">${v.m.toUpperCase()}</div>
                    ${v.items.map(i => `<div class="item-chip" onclick="add(${i.p})"><span>➕ ${i.n}</span><span class="price">₹${i.p}</span></div>`).join('')}
                    <div style="font-size:11px; margin:15px 0; color:var(--text-muted);">💡 ${v.tip}</div>
                    <button onclick="showVideo('${v.id}')" style="width:100%; padding:12px; border-radius:12px; border:none; background:white; color:black; font-weight:700; cursor:pointer;">WATCH TOUR</button>
                    <div id="${v.id}" class="video-box">
                        <div style="position:relative; padding-bottom:56.25%; height:0;"><iframe src="https://www.youtube.com/embed/${v.id}" style="position:absolute; width:100%; height:100%; border:none;" allowfullscreen></iframe></div>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        function add(p) { wallet += p; document.getElementById('budget').innerText = "₹" + wallet; }
        function resetBudget() { wallet = 0; document.getElementById('budget').innerText = "₹0"; }
        function showVideo(id) { let b = document.getElementById(id); b.style.display = (b.style.display === 'block') ? 'none' : 'block'; }
        function updateFeed(v) { render(database[v]); }

        window.onload = () => render(database.delhi);
    </script>
</body>
</html>
