<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BazaarCraft | Ultimate Market Navigator</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Poppins:wght@300;400;600&display=swap');

:root { --primary: #FF7B00; --bg: #050507; --border: rgba(255,255,255,0.1); --accent: #4ade80; }

body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; overflow-x: hidden; padding-bottom: 100px; }

header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 15px 5%; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: rgba(5, 5, 7, 0.95); backdrop-filter: blur(10px); z-index: 1000;
}

.logo { color: var(--primary); font-family: 'Syncopate', sans-serif; font-size: 14px; letter-spacing: 2px; text-decoration: none; }

.city-picker { background: #111; color: white; border: 1px solid var(--primary); padding: 8px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 12px; }

.container { padding: 20px 5%; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

.market-card { background: #0f0f13; padding: 20px; border-radius: 24px; border: 1px solid var(--border); }

.nav-tabs { display: flex; gap: 8px; margin: 15px 0; }
.btn { padding: 10px; border-radius: 12px; border: none; cursor: pointer; font-size: 11px; font-weight: 700; flex: 1; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; color: white; }
.maps { background: #4285F4; } .uber { background: black; border: 1px solid #333; } .whatsapp { background: #25D366; color: black; }

.catalog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
.item-card { background: #1a1a1a; padding: 10px; border-radius: 16px; position: relative; }
.item-thumb { width: 100%; height: 80px; object-fit: cover; border-radius: 10px; }

.wish-btn { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.6); border: none; color: var(--primary); border-radius: 50%; width: 25px; height: 25px; cursor: pointer; }

/* OFFLINE PANEL (MOBILE FIXED) */
.offline-fab { position: fixed; right: 20px; bottom: 85px; background: var(--primary); border: none; color: white; width: 60px; height: 60px; border-radius: 50%; font-size: 24px; cursor: pointer; z-index: 2001; box-shadow: 0 4px 20px rgba(255,123,0,0.5); font-weight: bold; }

.offline-modal { 
    position: fixed; bottom: -100%; left: 0; width: 100%; background: #111; 
    border-top: 3px solid var(--primary); padding: 25px; border-radius: 30px 30px 0 0; 
    z-index: 3000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); max-height: 85vh; overflow-y: auto;
}
.offline-modal.open { bottom: 0; }

.budget-box {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #111; padding: 12px 25px; border-radius: 40px; 
    border: 1px solid var(--primary); z-index: 2000; display: flex; align-items: center; gap: 20px; width: 85%; max-width: 320px; justify-content: center;
}

.login-btn { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 11px; }
.profile-img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary); display: none; cursor: pointer; }
.video-box { display: none; margin-top: 10px; border-radius: 15px; overflow: hidden; }
</style>
</head>

<body>

<header>
    <a href="#" class="logo">BAZAARCRAFT</a>
    <div style="display:flex; align-items:center; gap:8px;">
        <select class="city-picker" onchange="updateCity(this.value)">
            <option value="delhi">DELHI</option>
            <option value="mumbai">MUMBAI</option>
            <option value="goa">GOA 🏖️</option>
            <option value="pondicherry">PONDICHERRY 🗼</option>
            <option value="rishikesh">RISHIKESH ⛰️</option>
            <option value="manali">MANALI ❄️</option>
            <option value="jaipur">JAIPUR</option>
            <option value="kolkata">KOLKATA</option>
            <option value="varanasi">VARANASI</option>
            <option value="lucknow">LUCKNOW</option>
            <option value="pune">PUNE</option>
            <option value="bangalore">BANGALORE</option>
            <option value="patna">PATNA</option>
            <option value="bhopal">BHOPAL</option>
            <option value="indore">INDORE</option>
        </select>
        <button id="login-btn" class="login-btn" onclick="login()">LOGIN</button>
        <img id="user-img" class="profile-img" onclick="logout()">
    </div>
</header>

<div class="container" id="feed"></div>

<button class="offline-fab" onclick="toggleOffline()">📝</button>

<div class="offline-modal" id="offline-modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3 style="margin:0; color:var(--primary); font-family:Syncopate; font-size:14px;">OFFLINE SAVES</h3>
        <button onclick="toggleOffline()" style="background:none; border:none; color:white; font-size:24px;">✕</button>
    </div>
    <div id="offline-content" style="margin-bottom:25px;"></div>
    <button onclick="exportPDF()" style="width:100%; background:var(--primary); border:none; color:white; padding:18px; border-radius:18px; font-weight:700; cursor:pointer; font-size:14px;">📄 DOWNLOAD PDF ITINERARY</button>
    <button onclick="clearSaves()" style="width:100%; background:none; border:1px solid #333; color:#666; padding:10px; border-radius:15px; margin-top:15px; cursor:pointer; font-size:11px;">Clear All Saves</button>
</div>

<div class="budget-box">
    <span style="font-size:14px; font-weight:600;">TOTAL: <span id="total" style="color:var(--primary);">₹0</span></span>
    <button onclick="resetTotal()" style="background:none; border:1px solid #444; color:white; padding:5px 12px; border-radius:10px; cursor:pointer; font-size:10px; margin-left:10px;">RESET</button>
</div>

<script>
// --- 1. FIREBASE CONFIG ---
const firebaseConfig = {
  apiKey: "AIzaSyDQPbexaLV0te_3u1cGV5MYMys3rJfVeAA",
  authDomain: "bazaarcraft.firebaseapp.com",
  projectId: "bazaarcraft",
  storageBucket: "bazaarcraft.firebasestorage.app",
  messagingSenderId: "441338570171",
  appId: "1:441338570171:web:09e2c195bb2ee73654509e",
  measurementId: "G-0B4QQ7JH2N"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let wallet = 0;
let wishlist = [];
let currentCity = "delhi";
let currentUser = null;

// --- 2. AUTH & CLOUD ---
function login() { const provider = new firebase.auth.GoogleAuthProvider(); auth.signInWithPopup(provider); }
function logout() { if(confirm("Logout?")) auth.signOut().then(() => location.reload()); }

auth.onAuthStateChanged(user => {
    if (user) {
        currentUser = user;
        document.getElementById('login-btn').style.display = 'none';
        document.getElementById('user-img').src = user.photoURL;
        document.getElementById('user-img').style.display = 'block';
        db.collection("users").doc(user.uid).get().then(doc => {
            if(doc.exists) { wishlist = doc.data().wishlist || []; renderWishlist(); }
        });
    }
});

// --- 3. MASTER DATABASE (FULL 15 CITIES) ---
const masterDB = {
    "delhi": [
        {id:"gVVK5Q6-OG0", m:"Banjara Market", lat:"28.4132", lng:"77.1000", items:[{n:"Mirrors", p:800},{n:"Ceramics", p:200}], nav:"Sec 54 Metro → Gaushala Road"},
        {id:"tOVVnRnoml0", m:"Chawri Bazaar", lat:"28.6496", lng:"77.2274", items:[{n:"Antique Decor", p:1200}], nav:"Near Standard Sweets"}
    ],
    "mumbai": [
        {id:"2x-2aqYnjTk", m:"Crawford Market", lat:"18.9472", lng:"72.8340", items:[{n:"Lamps", p:400}], nav:"Behind Mandai"},
        {id:"k0HhWjGd9XQ", m:"Chor Bazaar", lat:"18.9619", lng:"72.8310", items:[{n:"Vintage Hub", p:1000}], nav:"Mutton Street"}
    ],
    "goa": [
        {id:"V9_W_1mCqZg", m:"Anjuna Flea", lat:"15.57", lng:"73.73", items:[{n:"Macrame", p:600}], nav:"Wednesdays Only"},
        {id:"l_q0N7XN6_E", m:"Mapusa Friday", lat:"15.59", lng:"73.81", items:[{n:"Pottery", p:350}], nav:"Friday Morning"}
    ],
    "jaipur":[{id:"_Ut-aGpCVaU", m:"Bapu Bazar", lat:"26.91", lng:"75.82", items:[{n:"Mojaris", p:350}], nav:"Sanganeri Gate"}],
    "kolkata":[{id:"vxqcwUGuTIU", m:"Gariahat", lat:"22.51", lng:"88.36", items:[{n:"Tant Saree", p:900}], nav:"Near Flyover"}],
    "varanasi":[{id:"nVAeSFIGgAE", m:"Thatheri", lat:"25.31", lng:"82.99", items:[{n:"Brassware", p:500}], nav:"Near Chowk"}],
    "lucknow":[{id:"V_jYSLeCxQ4", m:"Aminabad", lat:"26.84", lng:"80.92", items:[{n:"Chikan", p:700}], nav:"Pratap Mkt"}],
    "pondicherry":[{id:"S6l-K2tNf-g", m:"Sunday Mkt", lat:"11.93", lng:"79.83", items:[{n:"Paper Lamps", p:250}], nav:"MG Road"}],
    "rishikesh":[{id:"pT7rK2_Nf8w", m:"Laxman Jhula", lat:"30.12", lng:"78.32", items:[{n:"Crystals", p:300}], nav:"Bridge Lanes"}],
    "manali":[{id:"Ca_Fr3_YnP8", m:"Old Manali", lat:"32.25", lng:"77.18", items:[{n:"Woolen Art", p:450}], nav:"Old Bridge"}],
    "pune":[{id:"1g3nGOsMH0A", m:"Juna Bazaar", lat:"18.52", lng:"73.85", items:[{n:"Antiques", p:400}], nav:"Kesba Area"}],
    "bangalore":[{id:"Tv3gGVG2F38", m:"Chickpet", lat:"12.96", lng:"77.57", items:[{n:"Silk Saree", p:1500}], nav:"Old City"}],
    "patna":[{id:"tp10ZagNXfA", m:"Maurya Lok", lat:"25.61", lng:"85.13", items:[{n:"Handicraft", p:250}], nav:"Museum Rd"}],
    "bhopal":[{id:"C6Nv6hl34SE", m:"New Market", lat:"23.23", lng:"77.39", items:[{n:"Bead Bag", p:300}], nav:"Gate 2 area"}],
    "indore":[{id:"9N--Md7hu0Q", m:"MT Market", lat:"22.71", lng:"75.85", items:[{n:"Fabric", p:400}], nav:"Clock Tower"}]
};

// --- 4. ENGINE FUNCTIONS ---
function render(data) {
    const feed = document.getElementById("feed"); feed.innerHTML = "";
    data.forEach(v => {
        let maps = `https://www.google.com/maps/search/?api=1&query=${v.lat},${v.lng}`;
        let uber = `https://m.uber.com/ul/?action=setPickup&dropoff[latitude]=${v.lat}&dropoff[longitude]=${v.lng}`;
        feed.innerHTML += `
        <div class="market-card">
            <h3 style="color:var(--primary); margin:0 0 10px 0; font-size:16px;">${v.m.toUpperCase()}</h3>
            <div class="nav-tabs">
                <a href="${maps}" target="_blank" class="btn maps">MAPS</a>
                <a href="${uber}" target="_blank" class="btn uber">UBER</a>
                <a href="https://wa.me/919999999999" target="_blank" class="btn whatsapp">WA</a>
            </div>
            <div class="catalog-grid">
                ${v.items.map(i => `
                <div class="item-card">
                    <button class="wish-btn" onclick="saveToWishlist('${i.n}', ${i.p}, '${v.m}', '${v.nav}')">♥</button>
                    <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" class="item-thumb" onerror="this.src='https://via.placeholder.com/150x80?text=Market'">
                    <div style="font-size:11px; margin-top:5px; cursor:pointer;" onclick="add(${i.p})">${i.n} <span style="color:var(--accent);">₹${i.p}</span></div>
                </div>`).join("")}
            </div>
            <div style="font-size:11px; opacity:0.8; margin-top:10px;">📍 ${v.nav}</div>
            <button onclick="toggleVid('${v.id}')" style="width:100%; padding:10px; border-radius:12px; border:1px solid #333; background:none; color:white; font-size:11px; margin-top:10px; cursor:pointer;">🎥 WATCH TOUR</button>
            <div id="${v.id}" class="video-box"><iframe width="100%" height="200" src="https://www.youtube.com/embed/${v.id}" frameborder="0" allowfullscreen></iframe></div>
        </div>`;
    });
}

function saveToWishlist(name, price, market, nav) {
    wishlist.push({name, price, market, nav});
    if(currentUser) db.collection("users").doc(currentUser.uid).set({ wishlist: wishlist });
    renderWishlist(); alert("Saved to Offline Hub!");
}

function renderWishlist() {
    const box = document.getElementById("offline-content");
    box.innerHTML = wishlist.length ? "" : "<p style='opacity:0.4'>No items saved for offline use yet.</p>";
    wishlist.forEach(i => box.innerHTML += `<div style="border-bottom:1px solid #222; padding:10px 0; font-size:12px;">${i.name} - ₹${i.price} (@${i.market})</div>`);
}

function toggleOffline() { document.getElementById("offline-modal").classList.toggle("open"); }
function clearSaves() { wishlist = []; if(currentUser) db.collection("users").doc(currentUser.uid).set({ wishlist: [] }); renderWishlist(); }
function updateCity(c) { currentCity = c; render(masterDB[c]); }
function add(p) { wallet += p; document.getElementById("total").innerText = "₹" + wallet; }
function resetTotal() { wallet = 0; document.getElementById("total").innerText = "₹0"; }
function toggleVid(id) { let el = document.getElementById(id); el.style.display = el.style.display === "block" ? "none" : "block"; }

function exportPDF() {
    try {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.setFontSize(22); doc.setTextColor(255, 123, 0); doc.text("BazaarCraft: Offline Guide", 20, 20);
        let y = 40; doc.setFontSize(12); doc.setTextColor(0,0,0);
        wishlist.forEach((item, index) => {
            if(y > 270) { doc.addPage(); y = 20; }
            doc.text(`${index+1}. ${item.name} (₹${item.price})`, 20, y);
            doc.text(`   Market: ${item.market} | Gali: ${item.nav}`, 20, y + 8);
            y += 20;
        });
        doc.save("BazaarCraft_Offline_Trip.pdf");
    } catch (e) { alert("PDF Error: Please check internet connection."); }
}

updateCity("delhi");
</script>
</body>
</html>
