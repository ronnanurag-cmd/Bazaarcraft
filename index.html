<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarCraft | Premium Market Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Poppins:wght@300;400;600&display=swap');
        
        :root {
            --primary: #FF7B00; --bg: #050507; --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1); --accent: #FFB703;
        }

        body { 
            margin: 0; font-family: 'Poppins', sans-serif; background-color: var(--bg); color: white;
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #050507 80%);
            min-height: 100vh; overflow-x: hidden;
        }

        /* Live Market Pulse */
        .pulse-bar { background: #111; color: var(--accent); font-size: 11px; padding: 8px; border-bottom: 1px solid var(--border); overflow: hidden; }
        .ticker { display: inline-block; animation: scroll 30s linear infinite; white-space: nowrap; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-family: 'Syncopate', sans-serif; font-size: 18px; letter-spacing: 2px; color: var(--primary); text-decoration: none; }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }

        /* Premium Market Card */
        .market-card {
            background: var(--glass); border: 1px solid var(--border); border-radius: 32px;
            padding: 30px; backdrop-filter: blur(15px); transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .market-card:hover { border-color: var(--primary); transform: scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

        .item-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; margin: 10px 0; background: rgba(255,255,255,0.02);
            border-radius: 16px; cursor: pointer; transition: 0.3s;
        }
        .item-row:hover { background: rgba(74, 222, 128, 0.1); border: 1px solid #4ade80; }
        .price-tag { color: #4ade80; font-weight: 700; font-size: 15px; }

        .tip-box { font-size: 12px; color: var(--accent); background: rgba(255,183,3,0.05); padding: 12px; border-radius: 14px; margin: 20px 0; border-left: 3px solid var(--accent); }

        .video-reveal { display: none; margin-top: 20px; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }

        /* The Intelligence Footer */
        .footer-intel {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(30px);
            padding: 18px 40px; border-radius: 60px; border: 1px solid var(--primary);
            display: flex; align-items: center; gap: 50px; z-index: 2000;
        }
    </style>
</head>
<body>
    <div class="pulse-bar">
        <div class="ticker">🚀 LIVE UPDATES: Varanasi Brass UP (+5%) | Delhi Banjara: Police checking today, avoid Gali 1 | Jaipur: New Blue Pottery stock refreshed! | Kolkata: Gariahat crowds low, best for peaceful shopping.</div>
    </div>

    <header>
        <a href="#" class="logo">BAZAARCRAFT</a>
        <select id="city-selector" onchange="updateFeed(this.value)" style="background:none; color:white; border:none; font-weight:700; cursor:pointer; font-size:14px;">
            <option value="delhi">DELHI</option>
            <option value="mumbai">MUMBAI</option>
            <option value="kolkata">KOLKATA</option>
            <option value="jaipur">JAIPUR</option>
            <option value="lucknow">LUCKNOW</option>
            <option value="varanasi">VARANASI</option>
            <option value="patna">PATNA</option>
            <option value="bhopal">BHOPAL</option>
            <option value="indore">INDORE</option>
            <option value="pune">PUNE</option>
            <option value="bangalore">BANGALORE</option>
        </select>
    </header>

    <div class="container" id="feed"></div>

    <div class="footer-intel">
        <div>
            <span style="font-size:10px; opacity:0.6; display:block; letter-spacing:1px;">BUDGET PLANNER</span>
            <span id="budget-total" style="font-size:24px; font-weight:700; color:var(--primary);">₹0</span>
        </div>
        <button onclick="resetTotal()" style="background:none; border:1px solid #444; color:white; padding:10px 20px; border-radius:30px; cursor:pointer; font-weight:600;">RESET</button>
    </div>

    <script>
        let currentBudget = 0;
        
        // --- THE FULL UNABRIDGED DATABASE ---
        const masterDB = {
            "delhi": [
                { id: "oxdjZ8nSDOs", m: "Banjara Market", items: [{n: "Full Length Mirror", p: 1200}, {n: "Ceramic Vase", p: 250}], tip: "Bargain starts at 40% of quoted price." },
                { id: "wpPnBZOggAE", m: "Lajpat Nagar Central", items: [{n: "Designer Kurti", p: 650}, {n: "Bangle Set", p: 150}], tip: "Check Gali 2 for hidden fabric gems." },
                { id: "qM5Ycwz8-LA", m: "Sarojini Nagar", items: [{n: "Summer Tops", p: 150}, {n: "Footwear", p: 300}], tip: "Carry a big bag; they charge extra for polybags." }
            ],
            "kolkata": [
                { id: "kcjqDg0hmRE", m: "Galiff Street", items: [{n: "Terracotta Art", p: 80}, {n: "Garden Decor", p: 150}], tip: "Market closes by 11 AM sharp on Sundays." },
                { id: "399kxCYl7Yw", m: "Gariahat", items: [{n: "Tant Saree", p: 900}, {n: "Oxidized Jhumka", p: 100}], tip: "Don't miss the street food while shopping." },
                { id: "V-3bALJOmek", m: "Hatibagan", items: [{n: "Home Decor", p: 200}, {n: "Nightwear", p: 350}], tip: "North Kolkata's best budget hub." }
            ],
            "jaipur": [
                { id: "kCdTLhyzl8A", m: "Bapu Bazaar", items: [{n: "Leather Mojari", p: 350}, {n: "Sanganeri Bedspread", p: 850}], tip: "The inner lanes have lower prices than main road." },
                { id: "qKUW-l4Hy6M", m: "Johari Bazaar", items: [{n: "Kundan Ring", p: 1200}, {n: "Lac Bangles", p: 200}], tip: "Famous for authentic silver work." }
            ],
            "varanasi": [
                { id: "Rf1IHg85_TQ", m: "Thatheri Bazaar", items: [{n: "Brass Kalash", p: 450}, {n: "Copper Bottle", p: 400}], tip: "Authenticity check: Pure brass is heavy and cold." }
            ],
            "lucknow": [
                { id: "8TWLIsL6fXM", m: "Aminabad", items: [{n: "Chikan Kurta", p: 700}, {n: "Lucknowi Jutti", p: 400}], tip: "Compare handwork vs machine work closely." }
            ],
            "mumbai": [
                { id: "WbY2l_VOigo", m: "Crawford Market", items: [{n: "Imported Crockery", p: 300}, {n: "Party Decor", p: 150}], tip: "Wholesale rates only if you buy 3+ items." }
            ],
            "patna": [
                { id: "RDfb3o5o6Sc", m: "Maurya Lok", items: [{n: "Madhubani Art", p: 500}, {n: "Bamboo Lamp", p: 350}], tip: "Govt stalls are fixed price but authentic." }
            ],
            "bhopal": [
                { id: "rsOPFJebPMg", m: "New Market", items: [{n: "Beaded Bag", p: 300}, {n: "Zardosi Pillow", p: 450}], tip: "Ask for the 'Bhopali Batua' shops." }
            ],
            "indore": [
                { id: "7LyTGXM3haU", m: "MT Cloth Market", items: [{n: "Cotton Curtains", p: 500}, {n: "Sofa Covers", p: 800}], tip: "Purely a wholesale cloth destination." }
            ],
            "pune": [
                { id: "aGl_H_gGf_o", m: "Juna Bazaar", items: [{n: "Antiques", p: 400}, {n: "Old Coins", p: 100}], tip: "Open only on Wednesdays and Sundays." }
            ],
            "bangalore": [
                { id: "1h_wt99EhXQ", m: "Chickpet", items: [{n: "Silk Sarees", p: 1500}, {n: "Home Linen", p: 400}], tip: "Great for bulk wedding shopping." }
            ]
        };

        function render(list) {
            const feed = document.getElementById('feed'); feed.innerHTML = "";
            list.forEach(v => {
                const card = document.createElement('div'); card.className = 'market-card';
                card.innerHTML = `
                    <div style="font-size:10px; color:var(--accent); font-weight:700; letter-spacing:1px; margin-bottom:15px;">${v.m.toUpperCase()} ANALYSIS</div>
                    ${v.items.map(i => `<div class="item-row" onclick="addToBudget(${i.p})"><span>➕ ${i.n}</span><span class="price-tag">₹${i.p}</span></div>`).join('')}
                    <div class="tip-box">💡 ${v.tip}</div>
                    <button onclick="toggleVideo('${v.id}')" style="width:100%; padding:15px; border-radius:18px; border:none; background:white; color:black; font-weight:700; cursor:pointer; transition:0.3s;">VIEW VIDEO PROOF</button>
                    <div id="${v.id}" class="video-reveal">
                        <div style="position:relative; padding-bottom:56.25%; height:0;"><iframe src="https://www.youtube.com/embed/${v.id}" style="position:absolute; width:100%; height:100%; border:none;" allowfullscreen></iframe></div>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        function addToBudget(p) { currentBudget += p; document.getElementById('budget-total').innerText = "₹" + currentBudget; }
        function resetTotal() { currentBudget = 0; document.getElementById('budget-total').innerText = "₹0"; }
        function toggleVideo(id) { let box = document.getElementById(id); box.style.display = (box.style.display === 'block') ? 'none' : 'block'; }
        function updateFeed(val) { render(masterDB[val]); }

        window.onload = () => render(masterDB.delhi);
    </script>
</body>
</html>
