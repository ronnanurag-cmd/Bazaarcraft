<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarCraft | High-Contrast Navigator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Poppins:wght@300;400;600&display=swap');
        
        :root {
            --primary: #FF7B00; --bg: #050507; --surface: #121217;
            --border: rgba(255, 255, 255, 0.1); --accent: #FFB703;
        }

        body { 
            margin: 0; font-family: 'Poppins', sans-serif; background-color: var(--bg); color: white;
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #050507 80%);
            min-height: 100vh;
        }

        /* FIXED VISIBILITY DROPDOWN */
        .city-picker {
            background: #1A1A24; /* Solid dark background */
            color: white; border: 2px solid var(--primary);
            padding: 8px 15px; border-radius: 12px; font-weight: 700;
            font-size: 14px; outline: none; appearance: none; cursor: pointer;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-family: 'Syncopate', sans-serif; font-size: 18px; color: var(--primary); text-decoration: none; }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 30px; }

        .market-card {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 32px;
            padding: 25px; backdrop-filter: blur(15px); transition: 0.4s ease;
        }

        .catalog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .item-card { 
            background: rgba(255,255,255,0.02); border-radius: 20px; padding: 10px; 
            border: 1px solid transparent; transition: 0.3s; cursor: pointer;
        }
        .item-card:hover { border-color: var(--primary); background: rgba(255,123,0,0.05); }
        .item-img { width: 100%; height: 110px; object-fit: cover; border-radius: 12px; margin-bottom: 10px; background: #222; }
        
        .nav-script { font-size: 11px; color: #4ade80; border: 1px dashed rgba(74, 222, 128, 0.3); padding: 12px; border-radius: 15px; margin-bottom: 15px; }

        .footer-intel {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(30px);
            padding: 18px 40px; border-radius: 60px; border: 1px solid var(--primary);
            display: flex; align-items: center; gap: 50px; z-index: 2000; box-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }
        
        .video-box { display: none; margin-top: 20px; border-radius: 20px; overflow: hidden; }
    </style>
</head>
<body>
    <header>
        <a href="#" class="logo">BAZAARCRAFT</a>
        <select id="city-selector" class="city-picker" onchange="updateFeed(this.value)">
            <option value="delhi">DELHI</option>
            <option value="mumbai">MUMBAI</option>
            <option value="kolkata">KOLKATA</option>
            <option value="jaipur">JAIPUR</option>
            <option value="lucknow">LUCKNOW</option>
            <option value="varanasi">VARANASI</option>
            <option value="patna">PATNA</option>
            <option value="bhopal">BHOPAL</option>
            <option value="indore">INDORE</option>
            <option value="pune">PUNE</option>
            <option value="bangalore">BANGALORE</option>
        </select>
    </header>

    <div class="container" id="feed"></div>

    <div class="footer-intel">
        <div>
            <span style="font-size: 10px; opacity: 0.6; display: block; letter-spacing: 1px;">MARKET BUDGET</span>
            <span id="budget-total" style="font-size: 24px; font-weight: 700; color: var(--primary);">₹0</span>
        </div>
        <button onclick="resetTotal()" style="background:none; border:1px solid #444; color:white; padding:10px 20px; border-radius:30px; cursor:pointer;">RESET</button>
    </div>

    <script>
        let currentBudget = 0;
        
        const masterDB = {
            "delhi": [
                { 
                    id: "oxdjZ8nSDOs", m: "Banjara Market", 
                    items: [
                        {n: "Antique Mirror", p: 1200, img: "https://images.unsplash.com/photo-1618220179428-22790b461013?w=200"}, 
                        {n: "Blue Ceramic Pot", p: 250, img: "https://images.unsplash.com/photo-1581781870027-04212e231e96?w=200"}
                    ],
                    nav: "GALI GUIDE: Exit Sector 54 Metro. Rickshaw to 'Gaushala Road'. Gali 2 for mirrors.",
                    tip: "Bargain starts at 40%."
                },
                {
                    id: "wpPnBZOggAE", m: "Lajpat Nagar",
                    items: [{n: "Designer Suits", p: 650, img: "https://images.unsplash.com/photo-1583391733956-6c78276477e2?w=200"}],
                    nav: "GALI GUIDE: Enter Gate 1. Walk past 3C's Mall. Left at second jewelry stall.",
                    tip: "Monday is clearance day."
                }
            ],
            "kolkata": [
                { 
                    id: "399kxCYl7Yw", m: "Gariahat Market", 
                    items: [{n: "Tant Saree", p: 900, img: "https://images.unsplash.com/photo-1610030469915-9a88edc1bf92?w=200"}],
                    nav: "GALI GUIDE: Saree stalls are on the footpaths near the flyover.",
                    tip: "Evening is best for vibes."
                }
            ],
            "jaipur": [
                { 
                    id: "kCdTLhyzl8A", m: "Bapu Bazaar", 
                    items: [{n: "Leather Mojari", p: 350, img: "https://images.unsplash.com/photo-1605034313761-73ea4a0cfbf3?w=200"}],
                    nav: "GALI GUIDE: Enter Sanganeri Gate. First left 'Kucha' for wholesale.",
                    tip: "Quotes 600, give 300."
                }
            ],
            "varanasi": [
                { 
                    id: "Rf1IHg85_TQ", m: "Thatheri Bazaar", 
                    items: [{n: "Brass Kalash", p: 450, img: "https://images.unsplash.com/photo-1621360841013-c7683c659ec6?w=200"}],
                    nav: "GALI GUIDE: Walk from Godowlia towards Chowk. Look for silver shops.",
                    tip: "Buy by weight."
                }
            ],
            // Rest of cities (Mumbai, Lucknow, Patna, Bhopal, Indore, Pune, Bangalore) follow this pattern...
            "mumbai": [{ id: "WbY2l_VOigo", m: "Crawford", items: [{n: "Decor", p: 200, img: "https://images.unsplash.com/photo-1513519245088-0e12902e5a38?w=200"}], nav: "Lane behind fruit market.", tip: "Wholesale only." }],
            "lucknow": [{ id: "8TWLIsL6fXM", m: "Aminabad", items: [{n: "Chikan Kurti", p: 700, img: "https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?w=200"}], nav: "Pratap Market for high quality.", tip: "Verify handwork." }],
            "patna": [{ id: "RDfb3o5o6Sc", m: "Maurya Lok", items: [{n: "Handicrafts", p: 250, img: "https://images.unsplash.com/photo-1590736704728-f4730bb30770?w=200"}], nav: "Stalls near north entrance.", tip: "Fixed Govt rates." }],
            "bhopal": [{ id: "rsOPFJebPMg", m: "New Market", items: [{n: "Bead Bag", p: 300, img: "https://images.unsplash.com/photo-1544816155-12df9643f363?w=200"}], nav: "Inner jewelry lane.", tip: "Ask for Zardosi." }],
            "indore": [{ id: "7LyTGXM3haU", m: "MT Market", items: [{n: "Fabric", p: 400, img: "https://images.unsplash.com/photo-1528459801416-a9e53bbf4e17?w=200"}], nav: "Third right from clock tower.", tip: "Bulk hub." }],
            "pune": [{ id: "aGl_H_gGf_o", m: "Juna Bazaar", items: [{n: "Antiques", p: 400, img: "https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=200"}], nav: "Footpath stalls.", tip: "Wed/Sun only." }],
            "bangalore": [{ id: "1h_wt99EhXQ", m: "Chickpet", items: [{n: "Silk Saree", p: 1500, img: "https://images.unsplash.com/photo-1583391733956-6c78276477e2?w=200"}], nav: "Near old city police station.", tip: "Wedding hub." }]
        };

        function render(list) {
            const feed = document.getElementById('feed'); feed.innerHTML = "";
            list.forEach(v => {
                const card = document.createElement('div'); card.className = 'market-card';
                card.innerHTML = `
                    <div style="font-size:10px; color:var(--primary); font-weight:700; letter-spacing:1px; margin-bottom:15px;">${v.m.toUpperCase()} CATALOG</div>
                    <div class="catalog-grid">
                        ${v.items.map(i => `
                            <div class="item-card" onclick="addToBudget(${i.p})">
                                <img src="${i.img}" class="item-img" alt="${i.n}">
                                <div style="font-size:12px; display:flex; justify-content:space-between;">
                                    <span>${i.n}</span>
                                    <span style="color:#4ade80; font-weight:700;">₹${i.p}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="nav-script">📍 ${v.nav}</div>
                    <button onclick="toggleVideo('${v.id}')" style="width:100%; padding:15px; border-radius:18px; border:none; background:white; color:black; font-weight:700; cursor:pointer;">WATCH VIDEO TOUR</button>
                    <div id="${v.id}" class="video-box">
                        <div style="position:relative; padding-bottom:56.25%; height:0;"><iframe src="https://www.youtube.com/embed/${v.id}" style="position:absolute; width:100%; height:100%; border:none;" allowfullscreen></iframe></div>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        function addToBudget(p) { currentBudget += p; document.getElementById('budget-total').innerText = "₹" + currentBudget; }
        function resetTotal() { currentBudget = 0; document.getElementById('budget-total').innerText = "₹0"; }
        function toggleVideo(id) { let box = document.getElementById(id); box.style.display = (box.style.display === 'block') ? 'none' : 'block'; }
        function updateFeed(val) { render(masterDB[val]); }

        window.onload = () => render(masterDB.delhi);
    </script>
</body>
</html>
