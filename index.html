<style>
:root {
  --primary: #FF7B00;
  --bg: #050507;
  --border: rgba(255,255,255,0.1);
  --accent: #4ade80;
  --card-bg: #0f0f13;
  --surface: #1a1a1f;
}
* { box-sizing: border-box; }
body { margin:0; font-family:'Poppins',sans-serif; background:var(--bg); color:white; overflow-x:hidden; padding-bottom:130px; }

header { display:flex; justify-content:space-between; align-items:center; padding:15px 5%; border-bottom:1px solid var(--border); position:sticky; top:0; background:rgba(5,5,7,0.96); backdrop-filter:blur(12px); z-index:1000; }
.logo { color:var(--primary); font-family:'Syncopate',sans-serif; font-size:14px; letter-spacing:2px; text-decoration:none; }
.city-picker { background:#111; color:white; border:1.5px solid var(--primary); padding:8px 10px; border-radius:12px; font-weight:700; cursor:pointer; font-size:12px; outline:none; }

.search-wrap { padding:18px 5% 4px; }
.search-bar { width:100%; background:#111; border:1.5px solid var(--border); border-radius:16px; color:white; padding:12px 18px; font-size:13px; font-family:'Poppins',sans-serif; outline:none; transition:border-color 0.2s; }
.search-bar:focus { border-color:var(--primary); }
.search-bar::placeholder { color:rgba(255,255,255,0.3); }

.skeleton-grid { padding:20px 5%; display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:25px; }
.skeleton-card { background:var(--card-bg); border-radius:28px; border:1px solid var(--border); padding:20px; }
.skeleton-line { background:linear-gradient(90deg,#1a1a1f 25%,#252530 50%,#1a1a1f 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:8px; margin-bottom:10px; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

.container { padding:20px 5%; display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:25px; }

.market-card { background:var(--card-bg); padding:20px; border-radius:28px; border:1px solid var(--border); transition:transform 0.25s,box-shadow 0.25s; animation:fadeUp 0.4s ease both; }
.market-card:hover { transform:translateY(-4px); box-shadow:0 16px 40px rgba(255,123,0,0.1); }
@keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

.timing-badge { display:inline-flex; align-items:center; gap:5px; background:rgba(255,123,0,0.12); border:1px solid rgba(255,123,0,0.3); border-radius:20px; padding:3px 10px; font-size:10px; color:var(--primary); font-weight:700; margin-bottom:8px; }

.inventory-summary { background:rgba(255,255,255,0.03); border-radius:15px; padding:12px; margin:10px 0; border-left:3px solid var(--primary); }
.inventory-title { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--primary); font-weight:700; margin-bottom:5px; }
.inventory-list { font-size:11px; color:#ccc; line-height:1.5; }

.nav-tabs { display:flex; gap:8px; margin:15px 0; }
.btn { padding:10px; border-radius:12px; border:none; cursor:pointer; font-size:11px; font-weight:700; flex:1; text-align:center; text-decoration:none; display:flex; align-items:center; justify-content:center; color:white; transition:opacity 0.2s; }
.btn:hover { opacity:0.85; }
.maps { background:#4285F4; }
.uber { background:black; border:1px solid #333; }
.whatsapp { background:#25D366; color:black; }

.catalog-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:15px 0; }
.item-card { background:var(--surface); padding:10px; border-radius:18px; position:relative; cursor:pointer; transition:background 0.2s; }
.item-card:hover { background:#222230; }
.item-thumb-wrap { width:100%; height:90px; border-radius:12px; margin-bottom:6px; overflow:hidden; background:linear-gradient(135deg,#1e1e28,#2a2a38); display:flex; align-items:center; justify-content:center; }
.item-thumb { width:100%; height:100%; object-fit:cover; display:block; }
.item-thumb-placeholder { font-size:28px; opacity:0.4; display:none; }

.wish-btn { position:absolute; top:8px; right:8px; background:rgba(0,0,0,0.7); border:none; color:#555; border-radius:50%; width:28px; height:28px; cursor:pointer; z-index:10; font-size:14px; display:flex; align-items:center; justify-content:center; transition:color 0.2s,transform 0.15s; }
.wish-btn:hover { transform:scale(1.15); }
.wish-btn.wishlisted { color:var(--primary); }

.offline-fab { position:fixed; right:25px; bottom:100px; background:var(--primary); border:none; color:white; width:65px; height:65px; border-radius:50%; font-size:26px; cursor:pointer; z-index:2001; box-shadow:0 8px 25px rgba(255,123,0,0.5); transition:transform 0.2s; }
.offline-fab:hover { transform:scale(1.08); }

.offline-modal { position:fixed; bottom:-100%; left:0; width:100%; background:#0a0a0c; border-top:4px solid var(--primary); padding:30px; border-radius:35px 35px 0 0; z-index:3000; transition:bottom 0.5s cubic-bezier(0.19,1,0.22,1); max-height:85vh; overflow-y:auto; }
.offline-modal.open { bottom:0; }

.budget-box { position:fixed; bottom:25px; left:50%; transform:translateX(-50%); background:#111; padding:15px 30px; border-radius:50px; border:1px solid var(--primary); z-index:2000; display:flex; align-items:center; gap:25px; width:85%; max-width:380px; justify-content:center; box-shadow:0 4px 24px rgba(255,123,0,0.15); }

.video-box { display:none; margin-top:15px; border-radius:18px; overflow:hidden; border:1px solid var(--border); }

.toast { position:fixed; top:80px; left:50%; transform:translateX(-50%) translateY(-20px); background:#1a1a1f; border:1px solid var(--primary); color:white; padding:12px 22px; border-radius:30px; font-size:12px; font-weight:600; z-index:9999; opacity:0; transition:opacity 0.3s,transform 0.3s; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

.no-results { grid-column:1/-1; text-align:center; padding:60px 20px; opacity:0.4; font-size:14px; }

#loading-overlay { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; gap:16px; transition:opacity 0.4s; }
#loading-overlay .spinner { width:40px; height:40px; border:3px solid rgba(255,123,0,0.2); border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
#loading-overlay p { color:rgba(255,255,255,0.4); font-size:12px; letter-spacing:2px; font-family:'Syncopate',sans-serif; margin:0; }
</style>
</head>

// ── UTILITIES ────────────────────────────────────────────────────────────────
function getEmoji(name) {
  var n = name.toLowerCase();
  if (/saree|kurti|silk|fabric|cloth|dupatta|shawl|lungi|veshti/.test(n)) return "🧵";
  if (/ring|bangle|jewelry|jewel|necklace|bracelet|anklet|earring|pendant|kundan|lac/.test(n)) return "💍";
  if (/food|spice|halwa|chikki|pickle|honey|chips|bakery|fruit|coffee|tea/.test(n)) return "🍛";
  if (/paint|art|craft|idol|mural|miniature/.test(n)) return "🎨";
  if (/bag|tote|backpack|pouch|duffel|sling/.test(n)) return "👜";
  if (/shoe|jutti|mojari|sandal|footwear|slipper/.test(n)) return "👟";
  if (/lamp|lantern|light|candle|decor|toran|dreamcatcher/.test(n)) return "🏮";
  if (/table|chair|mirror|furniture|trunk/.test(n)) return "🪑";
  if (/soap|oil|attar|perfume|incense|kehwa|ayurvedic/.test(n)) return "🌿";
  return "🛍️";
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2000);
}

function hideSkeleton() {
  document.getElementById('skeleton').style.display = 'none';
  document.getElementById('feed').style.display = 'grid';
}

function hideOverlay() {
  var ov = document.getElementById('loading-overlay');
  ov.style.opacity = '0';
  setTimeout(function(){ ov.style.display = 'none'; }, 400);
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function onSearch(q) {
  searchQuery = q.trim().toLowerCase();
  render(masterDB[currentCity]);
}

function render(data) {
  var feed = document.getElementById('feed');
  feed.innerHTML = '';
  var filtered = searchQuery
    ? data.filter(function(v){ return v.m.toLowerCase().indexOf(searchQuery)>-1 || v.items.some(function(i){ return i.n.toLowerCase().indexOf(searchQuery)>-1; }); })
    : data;

  if (!filtered.length) {
    feed.innerHTML = '<div class="no-results">No markets or items match your search.</div>';
    return;
  }

  filtered.forEach(function(v, idx) {
    var maps   = 'https://www.google.com/maps/search/?api=1&query=' + v.lat + ',' + v.lng;
    var uber   = 'https://m.uber.com/ul/?action=setPickup&dropoff[latitude]=' + v.lat + '&dropoff[longitude]=' + v.lng;
    var waMsg  = encodeURIComponent('Check out ' + v.m + ' on BazaarCraft!\n📍 ' + v.nav + '\n🛍️ ' + v.items.map(function(i){ return i.n+' ₹'+i.p; }).join(', '));
    var synopsis = v.items.map(function(i){ return i.n+' (₹'+i.p+')'; }).join(', ');

    var itemCards = v.items.map(function(i) {
      var key   = i.n + '|' + v.m;
      var isWl  = wishlistSet.has(key);
      var emoji = getEmoji(i.n);
      var safeN   = i.n.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      var safeM   = v.m.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      var safeNav = v.nav.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      return '<div class="item-card" onclick="addToWallet('+i.p+',\''+safeN+'\')">'
        +'<button class="wish-btn '+(isWl?'wishlisted':'')+'" '
        +'onclick="event.stopPropagation();toggleWishlist(\''+safeN+'\','+i.p+',\''+safeM+'\',\''+safeNav+'\',this)" '
        +'title="'+(isWl?'Remove':'Save')+'">♥</button>'
        +'<div class="item-thumb-wrap">'
        +'<img class="item-thumb" src="https://img.youtube.com/vi/'+v.id+'/mqdefault.jpg" '
        +'onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';" alt="'+i.n+'">'
        +'<div class="item-thumb-placeholder" style="display:none;">'+emoji+'</div>'
        +'</div>'
        +'<div style="font-size:10px;text-align:center;">'+i.n
        +'<span style="color:var(--accent);display:block;font-weight:700;margin-top:2px;">₹'+i.p+'</span></div>'
        +'</div>';
    }).join('');

    var timingHtml = v.timing ? '<div class="timing-badge">'+v.timing+'</div>' : '';

    feed.innerHTML += '<div class="market-card" style="animation-delay:'+(idx*0.06)+'s;">'
      +timingHtml
      +'<h3 style="color:var(--primary);margin:0 0 10px 0;font-size:16px;letter-spacing:1px;">'+v.m.toUpperCase()+'</h3>'
      +'<div class="inventory-summary"><div class="inventory-title">Quick Inventory:</div><div class="inventory-list">'+synopsis+'</div></div>'
      +'<div class="nav-tabs">'
      +'<a href="'+maps+'" target="_blank" class="btn maps">MAPS</a>'
      +'<a href="'+uber+'" target="_blank" class="btn uber">UBER</a>'
      +'<a href="https://wa.me/?text='+waMsg+'" target="_blank" class="btn whatsapp">SHARE</a>'
      +'</div>'
      +'<div class="catalog-grid">'+itemCards+'</div>'
      +'<div style="font-size:11px;opacity:0.7;margin-top:10px;">📍 '+v.nav+'</div>'
      +'<button onclick="toggleVid(\''+v.id+'\')" style="width:100%;padding:12px;border-radius:15px;border:1px solid #333;background:none;color:white;font-size:11px;margin-top:12px;cursor:pointer;font-weight:600;">🎥 WATCH VIDEO TOUR</button>'
      +'<div id="'+v.id+'" class="video-box"><iframe width="100%" height="220" src="https://www.youtube.com/embed/'+v.id+'" frameborder="0" allowfullscreen loading="lazy"></iframe></div>'
      +'</div>';
  });
}

// ── WISHLIST ─────────────────────────────────────────────────────────────────
function toggleWishlist(name, price, market, nav, btn) {
  var key = name + '|' + market;
  if (wishlistSet.has(key)) {
    wishlist = wishlist.filter(function(i){ return !(i.name===name && i.market===market); });
    wishlistSet.delete(key);
    btn.classList.remove('wishlisted');
    showToast('Removed from saved');
  } else {
    wishlist.push({name:name, price:price, market:market, nav:nav});
    wishlistSet.add(key);
    btn.classList.add('wishlisted');
    showToast('♥ Saved — ' + name);
  }
  saveWishlistLocal();
  if (currentUser && db) db.collection("users").doc(currentUser.uid).set({wishlist:wishlist});
  renderWishlist();
}

function removeFromWishlist(idx) {
  var removed = wishlist.splice(idx, 1)[0];
  wishlistSet.delete(removed.name + '|' + removed.market);
  saveWishlistLocal();
  if (currentUser && db) db.collection("users").doc(currentUser.uid).set({wishlist:wishlist});
  renderWishlist();
  render(masterDB[currentCity]);
  showToast('Removed from saved');
}

function saveWishlistLocal() {
  try { localStorage.setItem('bc_wishlist', JSON.stringify(wishlist)); } catch(e){}
}

function renderWishlist() {
  var box     = document.getElementById('offline-content');
  var actions = document.getElementById('wishlist-actions');
  if (!wishlist.length) {
    box.innerHTML = "<p style='opacity:0.4;text-align:center;padding:20px 0;'>No items saved yet.</p>";
    actions.style.display = 'none';
    return;
  }
  actions.style.display = 'flex';
  box.innerHTML = wishlist.map(function(i, idx){
    return '<div style="border-bottom:1px solid #222;padding:12px 0;font-size:12px;display:flex;justify-content:space-between;align-items:center;">'
      +'<span>'+(idx+1)+'. '+i.name+' <span style="opacity:0.4;font-size:10px;">— '+i.market+'</span></span>'
      +'<div style="display:flex;align-items:center;gap:10px;">'
      +'<span style="color:var(--primary);font-weight:700;">₹'+i.price+'</span>'
      +'<button onclick="removeFromWishlist('+idx+')" style="background:none;border:1px solid #444;color:#888;border-radius:8px;padding:3px 8px;cursor:pointer;font-size:10px;">✕</button>'
      +'</div></div>';
  }).join('');
}

// ── BUDGET ───────────────────────────────────────────────────────────────────
function addToWallet(p, name) {
  wallet += p;
  try { localStorage.setItem('bc_wallet', wallet); } catch(e){}
  document.getElementById('total').innerText = '₹' + wallet.toLocaleString('en-IN');
  showToast('+ ₹' + p + ' added');
}

function resetTotal() {
  wallet = 0;
  try { localStorage.setItem('bc_wallet', '0'); } catch(e){}
  document.getElementById('total').innerText = '₹0';
}

// ── MISC ─────────────────────────────────────────────────────────────────────
function toggleOffline() {
  document.getElementById('offline-modal').classList.toggle('open');
  renderWishlist();
}
function updateCity(c) {
  currentCity = c; searchQuery = '';
  document.getElementById('search-input').value = '';
  render(masterDB[c]);
}
function toggleVid(id) {
  var el = document.getElementById(id);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}
function shareWishlistWhatsApp() {
  if (!wishlist.length) return;
  var lines = wishlist.map(function(i,idx){ return (idx+1)+'. '+i.name+' — ₹'+i.price+' ('+i.market+')'; }).join('\n');
  window.open('https://wa.me/?text='+encodeURIComponent('My BazaarCraft Shopping List 🛍️\n\n'+lines+'\n\nTotal: ₹'+wallet.toLocaleString('en-IN')), '_blank');
}
function exportPDF() {
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF();
  doc.setFont('helvetica','bold'); doc.setFontSize(18);
  doc.text("BazaarCraft — Trip Shopping List", 20, 20);
  doc.setFont('helvetica','normal'); doc.setFontSize(10);
  doc.text('City: '+currentCity.toUpperCase()+'   |   '+new Date().toLocaleDateString('en-IN'), 20, 30);
  doc.setDrawColor(255,123,0); doc.line(20,34,190,34);
  var y = 44;
  wishlist.forEach(function(item, i) {
    doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(0,0,0);
    doc.text((i+1)+'. '+item.name, 20, y);
    doc.text('Rs. '+item.price, 150, y);
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(150,150,150);
    doc.text(item.market+'  |  '+item.nav, 20, y+5);
    y += 16;
    if (y > 270) { doc.addPage(); y = 20; }
  });
  doc.setDrawColor(255,123,0); doc.line(20,y+4,190,y+4);
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(0,0,0);
  doc.text('TOTAL BUDGET: Rs. '+wallet.toLocaleString('en-IN'), 20, y+12);
  doc.save('BazaarCraft_'+currentCity+'_Trip.pdf');
}
function login()  { if(auth) auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
function logout() { if(auth && confirm("Logout?")) auth.signOut().then(function(){ location.reload(); }); }

// ── BOOT: load scripts sequentially, then start app ─────────────────────────
function loadScript(src, cb) {
  var s = document.createElement('script');
  s.src = src;
  s.onload = cb;
  s.onerror = cb; // continue even if one fails
  document.body.appendChild(s);
}

function startApp() {
  // Restore persisted state
  try {
    var saved = parseInt(localStorage.getItem('bc_wallet') || '0', 10);
    wallet = isNaN(saved) ? 0 : saved;
    var savedWl = JSON.parse(localStorage.getItem('bc_wishlist') || '[]');
    wishlist = Array.isArray(savedWl) ? savedWl : [];
    wishlistSet = new Set(wishlist.map(function(i){ return i.name+'|'+i.market; }));
    document.getElementById('total').innerText = '₹' + wallet.toLocaleString('en-IN');
  } catch(e) {}

  // Init Firebase if loaded
  if (typeof firebase !== 'undefined') {
    try {
      firebase.initializeApp({
        apiKey: "AIzaSyDQPbexaLV0te_3u1cGV5MYMys3rJfVeAA",
        authDomain: "bazaarcraft.firebaseapp.com",
        projectId: "bazaarcraft",
        storageBucket: "bazaarcraft.firebasestorage.app",
        messagingSenderId: "441338570171",
        appId: "1:441338570171:web:09e2c195bb2ee73654509e"
      });
      auth = firebase.auth();
      db   = firebase.firestore();

      auth.onAuthStateChanged(function(user) {
        if (user) {
          currentUser = user;
          document.getElementById('login-btn').style.display = 'none';
          var img = document.getElementById('user-img');
          img.src = user.photoURL; img.style.display = 'block';
          db.collection("users").doc(user.uid).get().then(function(doc) {
            if (doc.exists) {
              var cloud = doc.data().wishlist || [];
              cloud.forEach(function(ci) {
                var key = ci.name+'|'+ci.market;
                if (!wishlistSet.has(key)) { wishlist.push(ci); wishlistSet.add(key); }
              });
              saveWishlistLocal();
              renderWishlist();
            }
          });
        }
      });

      db.collection("masterDB").get().then(function(snapshot) {
        snapshot.forEach(function(doc) {
          var agentData = doc.data().markets;
          if (agentData && agentData.length > 0) masterDB[doc.id] = agentData;
        });
        renderWishlist();
        hideOverlay();
        hideSkeleton();
        render(masterDB[currentCity]);
      }).catch(function() {
        renderWishlist();
        hideOverlay();
        hideSkeleton();
        render(masterDB[currentCity]);
      });
    } catch(e) {
      renderWishlist();
      hideOverlay();
      hideSkeleton();
      render(masterDB[currentCity]);
    }
  } else {
    // Firebase unavailable — run fully offline
    renderWishlist();
    hideOverlay();
    hideSkeleton();
    render(masterDB[currentCity]);
  }
}

// Chain-load all external scripts, then boot
loadScript('https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js', function() {
  loadScript('https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js', function() {
    loadScript('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js', function() {
      loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js', function() {
        startApp();
      });
    });
  });
});
