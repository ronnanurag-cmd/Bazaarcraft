<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarCraft | Ultimate Navigation Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Poppins:wght@300;400;600&display=swap');
        :root { --primary: #FF7B00; --bg: #050507; --surface: #121217; --border: rgba(255, 255, 255, 0.1); --uber: #000000; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background-color: var(--bg); color: white; min-height: 100vh; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(5,5,7,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Syncopate', sans-serif; font-size: 16px; color: var(--primary); text-decoration: none; }
        .city-picker { background: #1A1A24; color: white; border: 2px solid var(--primary); padding: 8px 12px; border-radius: 12px; font-weight: 700; outline: none; }

        .container { max-width: 1200px; margin: 0 auto; padding: 30px 15px 120px; display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 25px; }

        .market-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 28px; padding: 20px; }
        
        /* Navigation Tabs */
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: white; font-size: 11px; font-weight: 600; cursor: pointer; text-decoration: none; text-align: center; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .tab-btn.maps { border-color: #4285F4; color: #4285F4; }
        .tab-btn.uber { background: var(--uber); border-color: #333; color: white; }

        .catalog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .item-card { background: rgba(255,255,255,0.02); border-radius: 18px; padding: 8px; text-align: center; }
        .thumb-img { width: 100%; height: 100px; object-fit: cover; border-radius: 12px; margin-bottom: 8px; }

        .gali-guide { font-size: 11px; color: #4ade80; border: 1px dashed rgba(74, 222, 128, 0.3); padding: 12px; border-radius: 12px; margin-bottom: 15px; background: rgba(74,222,128,0.02); }
        .watch-btn { width: 100%; padding: 12px; border-radius: 15px; border: none; background: white; color: black; font-weight: 700; cursor: pointer; }
        .video-box { display: none; margin-top: 15px; border-radius: 15px; overflow: hidden; }

        .budget-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: #1A1A24; padding: 15px 35px; border-radius: 50px; border: 1px solid var(--primary); display: flex; align-items: center; gap: 40px; z-index: 2000; }
    </style>
</head>
<body>
    <header>
        <a href="#" class="logo">BAZAARCRAFT</a>
        <select id="city-selector" class="city-picker" onchange="updateFeed(this.value)">
            <option value="delhi">DELHI</option>
            <option value="mumbai">MUMBAI</option>
            <option value="kolkata">KOLKATA</option>
            <option value="jaipur">JAIPUR</option>
            <option value="lucknow">LUCKNOW</option>
            <option value="varanasi">VARANASI</option>
            <option value="patna">PATNA</option>
            <option value="bhopal">BHOPAL</option>
            <option value="indore">INDORE</option>
            <option value="pune">PUNE</option>
            <option value="bangalore">BANGALORE</option>
        </select>
    </header>

    <div class="container" id="feed"></div>

    <div class="budget-bar">
        <div><span style="font-size:9px; opacity:0.6; display:block;">CASH TO CARRY</span><span id="total" style="font-size:22px; font-weight:700; color:var(--primary);">₹0</span></div>
        <button onclick="resetTotal()" style="background:none; border:1px solid #444; color:white; padding:8px 15px; border-radius:20px; cursor:pointer;">RESET</button>
    </div>

    <script>
        let wallet = 0;
        const masterDB = {
            "delhi": [
                { id: "gVVK5Q6-OG0", m: "Banjara Market", lat: "28.4132", lng: "77.1000", items: [{n: "Mirrors", p: 800}, {n: "Vases", p: 150}], nav: "Exit Sector 54 Metro. Rickshaw to 'Gaushala Road'." },
                { id: "tOVVnRnoml0", m: "Chawri Bazaar", lat: "28.6496", lng: "77.2274", items: [{n: "Antique Decor", p: 1200}], nav: "Exit Chawri Bazaar Metro. Lane near Standard Sweets." }
            ],
            "mumbai": [
                { id: "2x-2aqYnjTk", m: "Crawford Market", lat: "18.9472", lng: "72.8340", items: [{n: "Lamps", p: 400}], nav: "Lane behind Mahatma Phule Mandai." }
            ],
            "kolkata": [
                { id: "vxqcwUGuTIU", m: "Gariahat Market", lat: "22.5186", lng: "88.3664", items: [{n: "Saree", p: 900}], nav: "Stalls near Gariahat Flyover." }
            ],
            "jaipur": [
                { id: "_Ut-aGpCVaU", m: "Bapu Bazar", lat: "26.9189", lng: "75.8236", items: [{n: "Mojaris", p: 350}], nav: "Enter Sanganeri Gate. First left 'Kucha'." }
            ],
            "varanasi": [
                { id: "nVAeSFIGgAE", m: "Thatheri Bazaar", lat: "25.3117", lng: "82.9996", items: [{n: "Brass Kalash", p: 450}], nav: "Ask for 'Thatheri Gali' near Chowk silver shops." }
            ],
            "lucknow": [{ id: "V_jYSLeCxQ4", m: "Aminabad", lat: "26.8457", lng: "80.9272", items: [{n: "Chikan Kurti", p: 700}], nav: "Pratap Market for high quality." }],
            "patna": [{ id: "tp10ZagNXfA", m: "Maurya Lok", lat: "25.6122", lng: "85.1314", items: [{n: "Handicrafts", p: 250}], nav: "Stalls near Patna Museum entrance." }],
            "bhopal": [{ id: "C6Nv6hl34SE", m: "New Market", lat: "23.2311", lng: "77.3996", items: [{n: "Bead Bag", p: 300}], nav: "Gate No. 2 area inner lanes." }],
            "indore": [{ id: "9N--Md7hu0Q", m: "MT Market", lat: "22.7164", lng: "75.8542", items: [{n: "Curtains", p: 600}], nav: "Near Kanch Ka Mandir lanes." }],
            "pune": [{ id: "1g3nGOsMH0A", m: "Juna Bazaar", lat: "18.5284", lng: "73.8569", items: [{n: "Antiques", p: 400}], nav: "Footpath stalls near Kesba Peth." }],
            "bangalore": [{ id: "Tv3gGVG2F38", m: "Chickpet", lat: "12.9698", lng: "77.5772", items: [{n: "Silk", p: 1200}], nav: "Walking tour near police station." }]
        };

        function render(list) {
            const feed = document.getElementById('feed'); feed.innerHTML = "";
            list.forEach(v => {
                const card = document.createElement('div'); card.className = 'market-card';
                const uberLink = `https://m.uber.com/ul/?action=setPickup&pickup=my_location&dropoff[latitude]=${v.lat}&dropoff[longitude]=${v.lng}&dropoff[nickname]=${encodeURIComponent(v.m)}`;
                const mapsLink = `https://www.google.com/maps/dir/?api=1&destination=${v.lat},${v.lng}`;
                
                card.innerHTML = `
                    <div style="font-size:10px; color:var(--primary); font-weight:700; margin-bottom:12px;">${v.m.toUpperCase()}</div>
                    <div class="nav-tabs">
                        <a href="${mapsLink}" target="_blank" class="tab-btn maps">📍 GOOGLE MAPS</a>
                        <a href="${uberLink}" target="_blank" class="tab-btn uber">🚗 BOOK UBER</a>
                    </div>
                    <div class="catalog-grid">
                        ${v.items.map(i => `
                            <div class="item-card" onclick="add(${i.p})">
                                <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" class="thumb-img">
                                <div style="font-size:11px;">${i.n} <span style="color:#4ade80; font-weight:700;">₹${i.p}</span></div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="gali-guide"><strong>GALI GUIDE:</strong> ${v.nav}</div>
                    <button class="watch-btn" onclick="toggle('${v.id}')">WATCH VIDEO PROOF</button>
                    <div id="${v.id}" class="video-box">
                        <div style="position:relative; padding-bottom:56.25%; height:0;"><iframe src="https://www.youtube.com/embed/${v.id}" style="position:absolute; width:100%; height:100%; border:none;" allowfullscreen></iframe></div>
                    </div>
                `;
                feed.appendChild(card);
            });
        }
        function add(p) { wallet += p; document.getElementById('total').innerText = "₹" + wallet; }
        function resetTotal() { wallet = 0; document.getElementById('total').innerText = "₹0"; }
        function toggle(id) { let box = document.getElementById(id); box.style.display = (box.style.display === 'block') ? 'none' : 'block'; }
        function updateFeed(val) { render(masterDB[val]); }
        window.onload = () => render(masterDB.delhi);
    </script>
</body>
</html>
