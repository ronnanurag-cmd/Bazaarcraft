<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarCraft | India's Local Market Hub</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        :root {
            --primary: #FF7B00; 
            --bg-base: #0B0B0F; 
            --surface: #1A1A24; 
            --text-main: #FFFFFF;
            --text-muted: #A0A0B0;
            --accent: #FFB703;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-base);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 15px;
            background-color: rgba(11, 11, 15, 0.9);
            backdrop-filter: blur(15px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo {
            font-size: 18px; font-weight: 700;
            background: linear-gradient(45deg, #FF7B00, #FFB703);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .header-right { display: flex; align-items: center; gap: 10px; }

        /* Login Button Styling */
        .login-btn {
            background: var(--primary);
            color: white; border: none; padding: 6px 14px;
            border-radius: 12px; font-size: 11px; font-weight: 600;
            cursor: pointer;
        }

        .user-profile {
            display: none; /* Hidden until login */
            align-items: center; gap: 8px;
        }

        .profile-pic {
            width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--primary);
        }

        /* Hero & Content */
        .hero {
            text-align: center; padding: 40px 20px 20px;
            background: radial-gradient(circle at top, rgba(255, 123, 0, 0.1) 0%, transparent 70%);
        }

        .quote { font-size: 1.4rem; font-weight: 300; font-style: italic; color: var(--accent); margin-bottom: 20px; }

        .search-container {
            display: flex; max-width: 450px; margin: 0 auto;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px; padding: 4px;
        }

        .search-input { flex: 1; background: transparent; border: none; padding: 8px 15px; color: white; outline: none; }

        .search-btn { background: var(--primary); color: white; border: none; padding: 8px 18px; border-radius: 20px; font-size: 12px; cursor: pointer; }

        .container { max-width: 550px; margin: 0 auto; padding: 20px 15px 60px; }

        .video-card {
            background: var(--surface); border-radius: 16px; overflow: hidden;
            margin-bottom: 30px; border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .video-wrapper.youtube { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .product-list { padding: 15px; background: rgba(0,0,0,0.2); }
        .product-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .product-info h5 { margin: 0; font-size: 13px; }
        .price-chip { margin-left: auto; color: #4ade80; font-weight: 700; font-size: 12px; }

        .action-bar { display: flex; justify-content: space-between; padding: 10px 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .icon-btn { background: transparent; border: none; color: var(--text-muted); font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">BazaarCraft</a>
        <div class="header-right">
            <button id="login-btn" class="login-btn" onclick="signIn()">Login with Google</button>
            <div id="user-info" class="user-profile">
                <img id="user-pic" class="profile-pic" src="" alt="">
                <span id="user-name" style="font-size: 11px;"></span>
                <button class="icon-btn" onclick="signOut()" style="color:var(--primary)">Logout</button>
            </div>
        </div>
    </header>

    <div class="hero">
        <h1 class="quote">"True aesthetic is hidden in our galis."</h1>
        <div class="search-container">
            <input type="text" id="market-search" class="search-input" placeholder="Search Banjara, Brass..." onkeypress="handleEnter(event)">
            <button class="search-btn" onclick="executeSearch()">Go</button>
        </div>
    </div>

    <div class="container">
        <h2 id="video-city-title" style="font-size: 1.2rem; border-left: 3px solid var(--primary); padding-left: 10px;">Trending</h2>
        <div id="video-feed"></div>
    </div>

    <script>
        // --- 1. CONFIGURATION (REPLACE WITH YOUR DATA) ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // --- 2. AUTH LOGIC ---
        function signIn() {
            auth.signInWithPopup(provider).catch(error => alert(error.message));
        }

        function signOut() {
            auth.signOut();
        }

        // Monitor Login State
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('user-info').style.display = 'flex';
                document.getElementById('user-pic').src = user.photoURL;
                document.getElementById('user-name').innerText = user.displayName.split(" ")[0];
            } else {
                document.getElementById('login-btn').style.display = 'block';
                document.getElementById('user-info').style.display = 'none';
            }
        });

        // --- 3. THE REST OF YOUR APP LOGIC ---
        const masterDictionary = {
            "delhi": [{ id: "oxdjZ8nSDOs", platform: "youtube", market: "Banjara Market", topFinds: [{name: "Vases", price: "₹150", img: "🏺"}] }],
            "jaipur": [{ id: "nE5C9KvIqRQ", platform: "youtube", market: "Johari Bazaar", topFinds: [{name: "Jewelry", price: "₹300", img: "💍"}] }]
        };

        function renderFeed(videoList) {
            const feed = document.getElementById('video-feed');
            feed.innerHTML = "";
            if (!videoList) return;

            videoList.forEach(video => {
                const card = document.createElement("div");
                card.className = "video-card";
                card.innerHTML = `
                    <div class="video-wrapper youtube"><iframe src="https://www.youtube.com/embed/${video.id}"></iframe></div>
                    <div class="product-list">
                        <div style="font-size:11px;color:var(--accent);margin-bottom:10px">BEST FINDS: ${video.market}</div>
                        ${video.topFinds.map(i => `<div class="product-item"><span>${i.img}</span><div class="product-info"><h5>${i.name}</h5></div><div class="price-chip">${i.price}</div></div>`).join("")}
                    </div>
                    <div class="action-bar">
                        <button class="icon-btn">☆ Save</button>
                        <button class="icon-btn" onclick="window.open('https://api.whatsapp.com/send?text=Check this! https://youtu.be/${video.id}')">📲 Share</button>
                    </div>`;
                feed.appendChild(card);
            });
        }

        function executeSearch() {
            const term = document.getElementById('market-search').value.toLowerCase().trim();
            renderFeed(masterDictionary[term] || []);
        }

        function handleEnter(e) { if (e.key === "Enter") executeSearch(); }

        window.onload = () => renderFeed(masterDictionary["delhi"]);
    </script>
</body>
</html>
