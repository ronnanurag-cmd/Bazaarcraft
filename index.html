<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BazaarCraft | Ultimate Market Navigator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Poppins:wght@300;400;600&display=swap');

:root {
--primary:#FF7B00;
--bg:#050507;
--border:rgba(255,255,255,0.1);
}

body {margin:0;font-family:Poppins, sans-serif;background:var(--bg);color:white;}

header {
display:flex;justify-content:space-between;align-items:center;
padding:15px;border-bottom:1px solid var(--border);
position:sticky;top:0;background:#050507;z-index:1000;
}

.logo {color:var(--primary);font-family:Syncopate;font-size:14px;}

.city-picker {
background:#111;color:white;border:2px solid var(--primary);
padding:8px;border-radius:10px;font-weight:700;
}

.top-bar {
display:flex;gap:10px;padding:15px;flex-wrap:wrap;background:rgba(255,255,255,0.02);
}

input,select.filter-select {padding:10px;border-radius:12px;border:1px solid var(--border);background:#111;color:white;outline:none;}

.container {
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:20px;
}

.market-card {
background:#111;padding:15px;border-radius:20px;
border:1px solid var(--border);transition:0.3s;
}
.market-card:hover {border-color:var(--primary);}

.nav-tabs {
display:flex;gap:10px;margin-bottom:10px;
}

.btn {
padding:8px;border-radius:10px;border:none;cursor:pointer;font-size:11px;font-weight:700;flex:1;text-align:center;text-decoration:none;
}

.maps {background:#4285F4;color:white;}
.uber {background:black;color:white;border:1px solid #333;}
.whatsapp {background:#25D366;color:black;}

.catalog-grid {
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.item-card {
background:#1a1a1a;padding:10px;border-radius:12px;
display:flex;flex-direction:column;gap:8px;position:relative;
}

.item-thumb {width:100%;height:80px;object-fit:cover;border-radius:10px;background:#333;}

.video-box {display:none;margin-top:10px;}

.gali {
font-size:12px;color:#4ade80;margin:10px 0;font-weight:600;
}

.budget-box {
position:fixed;bottom:20px;left:50%;
transform:translateX(-50%);
background:#111;padding:15px 25px;
border-radius:30px;border:1px solid var(--primary);z-index:2000;
display:flex;align-items:center;gap:15px;
}

.wishlist {
position:fixed;right:10px;top:150px;
background:#111;padding:15px;border-radius:15px;
width:180px;border:1px solid var(--border);display:none;
}
@media (min-width: 1100px) { .wishlist { display: block; } }

.export-btn {
background:var(--primary);color:white;border:none;padding:8px;border-radius:8px;font-size:10px;font-weight:700;width:100%;margin-top:10px;cursor:pointer;
}
</style>
</head>

<body>

<header>
<div class="logo">BAZAARCRAFT</div>
<select class="city-picker" onchange="updateCity(this.value)">
<option value="delhi">DELHI</option>
<option value="mumbai">MUMBAI</option>
<option value="kolkata">KOLKATA</option>
<option value="jaipur">JAIPUR</option>
<option value="lucknow">LUCKNOW</option>
<option value="varanasi">VARANASI</option>
<option value="patna">PATNA</option>
<option value="bhopal">BHOPAL</option>
<option value="indore">INDORE</option>
<option value="pune">PUNE</option>
<option value="bangalore">BANGALORE</option>
</select>
</header>

<div class="top-bar">
<input type="text" placeholder="Search item..." onkeyup="search(this.value)">
<select class="filter-select" onchange="filterBudget(this.value)">
<option value="all">All Budget</option>
<option value="500">Under ₹500</option>
<option value="1000">Under ₹1000</option>
</select>
</div>

<div class="container" id="feed"></div>

<div class="wishlist">
<h4 style="margin:0 0 10px 0; color:var(--primary); font-size:12px;">❤️ Wishlist</h4>
<div id="wishlist" style="font-size:11px; max-height:150px; overflow-y:auto;"></div>
<button class="export-btn" onclick="exportPDF()">📄 DOWNLOAD ITINERARY</button>
<button class="export-btn" style="background:#444; margin-top:5px;" onclick="clearWishlist()">Clear Wishlist</button>
</div>

<div class="budget-box">
<div style="font-size:11px; opacity:0.7;">TOTAL: <span id="total" style="font-size:18px; color:var(--primary); font-weight:700; display:block;">₹0</span></div>
<button onclick="reset()" style="background:none; border:1px solid #444; color:white; padding:5px 10px; border-radius:10px; cursor:pointer; font-size:10px;">Reset</button>
</div>

<script>
let wallet=0;
let wishlist=JSON.parse(localStorage.getItem("wishlist"))||[];
let currentCity="delhi";

const masterDB = {
"delhi":[
{id:"gVVK5Q6-OG0",m:"Banjara Market",lat:"28.4132",lng:"77.1000",items:[{n:"Mirrors",p:800},{n:"Ceramics",p:200}],nav:"Sec 54 Metro → Gaushala Road",vendor:"Raju Decor",phone:"919999999999"},
{id:"tOVVnRnoml0",m:"Chawri Bazaar",lat:"28.6496",lng:"77.2274",items:[{n:"Antique Decor",p:1200}],nav:"Near Standard Sweets",vendor:"Old Delhi Arts",phone:"919888888888"},
{id:"p0Zf6f-6u6o",m:"Sarojini Nagar",lat:"28.5771",lng:"77.1982",items:[{n:"Export Wear",p:150}],nav:"Gate 2",vendor:"Fashion Hub",phone:"917777777777"},
{id:"wpPnBZOggAE",m:"Lajpat Nagar",lat:"28.5677",lng:"77.2432",items:[{n:"Fabrics",p:250}],nav:"Central Market Gate 1",vendor:"Fabric World",phone:"916666666666"}
],
"mumbai":[
{id:"2x-2aqYnjTk",m:"Crawford Market",lat:"18.9472",lng:"72.8340",items:[{n:"Lamps",p:400}],nav:"Behind Mandai",vendor:"A1 Lights",phone:"918888888888"},
{id:"k0HhWjGd9XQ",m:"Chor Bazaar",lat:"18.9619",lng:"72.8310",items:[{n:"Vintage Items",p:1000}],nav:"Mutton Street",vendor:"Vintage Hub",phone:"917777777777"},
{id:"Jz0uYHj2W6s",m:"Hill Road Market",lat:"19.0550",lng:"72.8260",items:[{n:"Street Fashion",p:300}],nav:"Bandra Police Station",vendor:"Bandra Trends",phone:"916666666666"}
],
"kolkata":[
{id:"vxqcwUGuTIU",m:"Gariahat Market",lat:"22.5186",lng:"88.3664",items:[{n:"Tant Saree",p:900}],nav:"Near Flyover",vendor:"Bengal Crafts",phone:"917777777777"},
{id:"2BGTKmSmdgU",m:"New Market",lat:"22.5600",lng:"88.3519",items:[{n:"Leather Goods",p:400}],nav:"Hogg Market",vendor:"Leather Hub",phone:"916666666666"},
{id:"kcjqDg0hmRE",m:"Galiff Street",lat:"22.6019",lng:"88.3712",items:[{n:"Plants",p:100}],nav:"Sunday only",vendor:"Green Kolkata",phone:"915555555555"}
],
"jaipur":[
{id:"_Ut-aGpCVaU",m:"Bapu Bazar",lat:"26.9189",lng:"75.8236",items:[{n:"Mojaris",p:350}],nav:"Sanganeri Gate",vendor:"Rajasthan Crafts",phone:"914444444444"},
{id:"kCdTLhyzl8A",m:"Johari Bazaar",lat:"26.9205",lng:"75.8268",items:[{n:"Jewelry",p:1000}],nav:"Near Hawa Mahal",vendor:"Gem Palace",phone:"913333333333"}
],
"varanasi":[
{id:"nVAeSFIGgAE",m:"Thatheri Bazaar",lat:"25.3117",lng:"82.9996",items:[{n:"Brassware",p:500}],nav:"Near Chowk",vendor:"Kashi Brass",phone:"912222222222"},
{id:"Rf1IHg85_TQ",m:"Vishwanath Galli",lat:"25.3109",lng:"83.0105",items:[{n:"Wooden Toys",p:150}],nav:"Temple lanes",vendor:"Temple Crafts",phone:"911111111111"}
],
"lucknow":[{id:"V_jYSLeCxQ4",m:"Aminabad",lat:"26.8457",lng:"80.9272",items:[{n:"Chikan Kurti",p:700}],nav:"Pratap Market",vendor:"Lucknow Chikan",phone:"919000000000"}],
"patna":[{id:"tp10ZagNXfA",m:"Maurya Lok",lat:"25.6122",lng:"85.1314",items:[{n:"Handicrafts",p:250}],nav:"Near Museum",vendor:"Bihar Crafts",phone:"918000000000"}],
"bhopal":[{id:"C6Nv6hl34SE",m:"New Market",lat:"23.2311",lng:"77.3996",items:[{n:"Bead Bag",p:300}],nav:"Jewelry lanes",vendor:"MP Crafts",phone:"917000000000"}],
"indore":[{id:"9N--Md7hu0Q",m:"MT Market",lat:"22.7164",lng:"75.8542",items:[{n:"Fabric",p:400}],nav:"Clock Tower",vendor:"Indore Textiles",phone:"916000000000"}],
"pune":[{id:"1g3nGOsMH0A",m:"Juna Bazaar",lat:"18.5284",lng:"73.8569",items:[{n:"Antiques",p:400}],nav:"Kesba Area",vendor:"Vintage Pune",phone:"915000000000"}],
"bangalore":[{id:"Tv3gGVG2F38",m:"Chickpet",lat:"12.9698",lng:"77.5772",items:[{n:"Silk",p:1500}],nav:"Old City",vendor:"Silk House",phone:"914000000000"}]
};

function render(data){
let feed=document.getElementById("feed");
feed.innerHTML="";

data.forEach(v=>{
if(v.items.length === 0) return;
let maps=`https://www.google.com/maps/search/?api=1&query=${v.lat},${v.lng}`;
let uber=`https://m.uber.com/ul/?action=setPickup&dropoff[latitude]=${v.lat}&dropoff[longitude]=${v.lng}`;
let wa=`https://wa.me/${v.phone}`;

feed.innerHTML+=`
<div class="market-card">
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
<h3 style="margin:0; font-size:16px; color:var(--primary);">${v.m.toUpperCase()}</h3>
<span style="font-size:10px; opacity:0.6;">🏪 ${v.vendor}</span>
</div>

<div class="nav-tabs">
<a href="${maps}" target="_blank" class="btn maps">MAPS</a>
<a href="${uber}" target="_blank" class="btn uber">UBER</a>
<a href="${wa}" target="_blank" class="btn whatsapp">WHATSAPP</a>
</div>

<div class="catalog-grid">
${v.items.map(i=>`
<div class="item-card">
<img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" class="item-thumb">
<div style="display:flex; justify-content:space-between; width:100%; align-items:center;">
<span onclick="add(${i.p})" style="font-size:11px; cursor:pointer;">${i.n} ₹${i.p}</span>
<button onclick="saveItem('${i.n}',${i.p}, '${v.m}', '${v.nav}')" style="background:none; border:none; color:var(--primary); cursor:pointer;">❤️</button>
</div>
</div>
`).join("")}
</div>

<div class="gali">📍 ${v.nav}</div>

<button onclick="toggle('${v.id}')" style="width:100%; padding:10px; border-radius:12px; border:1px solid #333; background:none; color:white; cursor:pointer; font-size:11px; margin-top:10px;">🎥 WATCH TOUR</button>

<div id="${v.id}" class="video-box">
<iframe width="100%" height="200" src="https://www.youtube.com/embed/${v.id}" allowfullscreen frameborder="0"></iframe>
</div>
</div>
`;
});
}

function updateCity(city){
currentCity=city;
render(masterDB[city]);
}

function add(p){
wallet+=p;
document.getElementById("total").innerText="₹"+wallet;
}

function reset(){
wallet=0;
document.getElementById("total").innerText="₹0";
}

function toggle(id){
let el=document.getElementById(id);
el.style.display = el.style.display==="block"?"none":"block";
}

function filterBudget(val){
let data = masterDB[currentCity];
if(val==="all") return render(data);
let filtered=data.map(m=>({...m, items:m.items.filter(i=>i.p<=val)}));
render(filtered);
}

function search(q){
let data = masterDB[currentCity];
q=q.toLowerCase();
let filtered=data.map(m=>({...m, items:m.items.filter(i=>i.n.toLowerCase().includes(q))}));
render(filtered);
}

function saveItem(name,price,market,nav){
wishlist.push({name,price,market,nav});
localStorage.setItem("wishlist",JSON.stringify(wishlist));
renderWishlist();
}

function clearWishlist(){
wishlist = [];
localStorage.removeItem("wishlist");
renderWishlist();
}

function renderWishlist(){
let box=document.getElementById("wishlist");
box.innerHTML="";
wishlist=JSON.parse(localStorage.getItem("wishlist"))||[];
if(wishlist.length===0) { box.innerHTML="<div style='opacity:0.5'>Wishlist Empty</div>"; return; }
wishlist.forEach(i=>{
box.innerHTML+=`<div style="border-bottom:1px solid #222; padding:5px 0;">${i.name} (₹${i.p || i.price})</div>`;
});
}

async function exportPDF() {
const { jsPDF } = window.jspdf;
const doc = new jsPDF();
doc.setFontSize(22);
doc.setTextColor(255, 123, 0);
doc.text("BazaarCraft Shopping Itinerary", 20, 20);

doc.setFontSize(12);
doc.setTextColor(0, 0, 0);
doc.text(`Date: ${new Date().toLocaleDateString()}`, 20, 30);

let y = 45;
wishlist.forEach((item, index) => {
if(y > 270) { doc.addPage(); y = 20; }
doc.setFont("helvetica", "bold");
doc.text(`${index + 1}. ${item.name} - ₹${item.price}`, 20, y);
doc.setFont("helvetica", "normal");
doc.text(`   Market: ${item.market}`, 20, y + 7);
doc.text(`   Gali Route: ${item.nav}`, 20, y + 14);
y += 25;
});

doc.save("BazaarCraft_Shopping_List.pdf");
}

updateCity("delhi");
renderWishlist();
</script>

</body>
</html>
