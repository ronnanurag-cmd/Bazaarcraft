<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarCraft | India's Local Market Hub</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        :root {
            --primary: #FF7B00; --bg-base: #0B0B0F; --surface: #1A1A24; 
            --text-main: #FFFFFF; --text-muted: #A0A0B0; --accent: #FFB703;
        }
        body { margin: 0; font-family: 'Poppins', sans-serif; background-color: var(--bg-base); color: var(--text-main); -webkit-font-smoothing: antialiased; }
        
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: rgba(11, 11, 15, 0.9); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-size: 20px; font-weight: 700; background: linear-gradient(45deg, #FF7B00, #FFB703); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        
        .header-right { display: flex; align-items: center; gap: 10px; }
        select.location-dropdown { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 5px; border-radius: 10px; font-size: 11px; outline: none; }
        .login-btn { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 600; cursor: pointer; }
        .user-profile { display: none; align-items: center; gap: 8px; }
        .profile-pic { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--primary); }

        .hero { text-align: center; padding: 40px 20px; background: radial-gradient(circle at top, rgba(255, 123, 0, 0.1) 0%, transparent 70%); }
        .search-container { display: flex; max-width: 450px; margin: 0 auto; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 4px; }
        .search-input { flex: 1; background: transparent; border: none; padding: 8px 15px; color: white; outline: none; }
        .search-btn { background: var(--primary); color: white; border: none; padding: 8px 18px; border-radius: 20px; font-size: 12px; cursor: pointer; }

        .container { max-width: 550px; margin: 0 auto; padding: 20px 15px; }
        .section-title { font-size: 1.2rem; margin: 20px 0; border-left: 4px solid var(--primary); padding-left: 12px; }

        /* Amazon/Flipkart Decor Section */
        .decor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .decor-card { background: var(--surface); border-radius: 12px; padding: 10px; text-decoration: none; color: white; border: 1px solid rgba(255,255,255,0.05); }
        .decor-price { color: #4ade80; font-weight: 700; font-size: 12px; display: block; margin-top: 5px; }

        .video-card { background: var(--surface); border-radius: 16px; overflow: hidden; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.05); }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .product-list { padding: 15px; background: rgba(0,0,0,0.2); }
        .product-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 13px; }
        .price-tag { margin-left: auto; color: #4ade80; font-weight: 700; }
        
        .action-bar { display: flex; justify-content: space-between; padding: 10px 15px; background: rgba(255,255,255,0.02); }
        .icon-btn { background: transparent; border: none; color: var(--text-muted); font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">BazaarCraft</a>
        <div class="header-right">
            <select id="city-selector" class="location-dropdown" onchange="handleDropdownChange(this.value)">
                <option value="delhi">Delhi</option>
                <option value="mumbai">Mumbai</option>
                <option value="jaipur">Jaipur</option>
                <option value="lucknow">Lucknow</option>
                <option value="patna">Patna</option>
                <option value="bhopal">Bhopal</option>
                <option value="varanasi">Varanasi</option>
            </select>
            <button id="login-btn" class="login-btn" onclick="signIn()">Login</button>
            <div id="user-info" class="user-profile">
                <img id="user-pic" class="profile-pic" src="">
                <span id="user-name" style="font-size:11px"></span>
            </div>
        </div>
    </header>

    <div class="hero">
        <h1 style="font-size:1.4rem; font-style:italic; color:var(--accent)">"India's finest aesthetic, found in your galis."</h1>
        <div class="search-container">
            <input type="text" id="market-search" class="search-input" placeholder="Search Banjara, Brass, Jaipur..." onkeypress="handleEnter(event)">
            <button class="search-btn" onclick="executeSearch()">Go</button>
        </div>
    </div>

    <div class="container">
        <h2 class="section-title">Shop Curated Decor</h2>
        <div class="decor-grid">
            <a href="https://amazon.in" target="_blank" class="decor-card">
                <div style="font-size:24px">🏺</div>
                <div style="font-size:12px; font-weight:600">Ceramic Planter</div>
                <span class="decor-price">₹299 on Amazon</span>
            </a>
            <a href="https://flipkart.com" target="_blank" class="decor-card">
                <div style="font-size:24px">🪔</div>
                <div style="font-size:12px; font-weight:600">Brass Diya Set</div>
                <span class="decor-price">₹450 on Flipkart</span>
            </a>
        </div>

        <h2 class="section-title">Market Tours: <span id="city-title" style="color:var(--primary)">Delhi</span></h2>
        <div id="video-feed"></div>
    </div>

    <script>
        // --- CONFIG ---
        const firebaseConfig = { apiKey: "YOUR_KEY", authDomain: "YOUR_DOMAIN", projectId: "YOUR_ID", appId: "YOUR_APP" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        function signIn() { auth.signInWithRedirect(provider); }
        function signOut() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-btn').style.display='none';
                document.getElementById('user-info').style.display='flex';
                document.getElementById('user-pic').src = user.photoURL;
                document.getElementById('user-name').innerText = user.displayName.split(" ")[0];
            }
        });

        // --- THE FULL NATIONWIDE DATABASE ---
        const masterDictionary = {
            "delhi": [{ id: "oxdjZ8nSDOs", platform: "youtube", market: "Banjara Market", finds: [{n: "Vases", p: "₹150"}] }],
            "mumbai": [{ id: "WbY2l_VOigo", platform: "youtube", market: "Crawford Market", finds: [{n: "Lanterns", p: "₹200"}] }],
            "jaipur": [{ id: "nE5C9KvIqRQ", platform: "youtube", market: "Johari Bazaar", finds: [{n: "Jewelry", p: "₹300"}] }],
            "lucknow": [{ id: "8TWLIsL6fXM", platform: "youtube", market: "Aminabad", finds: [{n: "Chikan Work", p: "₹800"}] }],
            "patna": [{ id: "RDfb3o5o6Sc", platform: "youtube", market: "Maurya Lok", finds: [{n: "Handicrafts", p: "₹250"}] }],
            "bhopal": [{ id: "rsOPFJebPMg", platform: "youtube", market: "New Market", finds: [{n: "Bead Work", p: "₹200"}] }],
            "varanasi": [{ id: "Rf1IHg85_TQ", platform: "youtube", market: "Thatheri Bazaar", finds: [{n: "Brassware", p: "₹500"}] }]
        };

        function renderFeed(list) {
            const feed = document.getElementById('video-feed'); feed.innerHTML = "";
            if (!list) return;
            list.forEach(v => {
                const card = document.createElement("div"); card.className = "video-card";
                card.innerHTML = `
                    <div class="video-wrapper"><iframe src="https://www.youtube.com/embed/${v.id}"></iframe></div>
                    <div class="product-list">
                        <div style="font-size:11px; color:var(--accent); margin-bottom:10px">FEATURED AT ${v.market.toUpperCase()}</div>
                        ${v.finds.map(f => `<div class="product-item"><span>✨</span> ${f.n} <span class="price-tag">${f.p}</span></div>`).join("")}
                    </div>
                    <div class="action-bar"><button class="icon-btn">☆ Save</button><button class="icon-btn" onclick="window.open('https://wa.me/?text=Check this! https://youtu.be/${v.id}')">📲 Share</button></div>`;
                feed.appendChild(card);
            });
        }

        function handleDropdownChange(val) { document.getElementById('city-title').innerText = val.toUpperCase(); renderFeed(masterDictionary[val]); }
        function executeSearch() { const t = document.getElementById('market-search').value.toLowerCase(); renderFeed(masterDictionary[t] || []); }
        function handleEnter(e) { if(e.key === "Enter") executeSearch(); }

        window.onload = () => renderFeed(masterDictionary["delhi"]);
    </script>
</body>
</html>
