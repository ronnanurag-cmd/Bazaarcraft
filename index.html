<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BazaarCraft | Ultimate Market Navigator</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Poppins:wght@300;400;600&display=swap');

:root {
    --primary: #FF7B00;
    --bg: #050507;
    --border: rgba(255,255,255,0.1);
    --accent: #4ade80;
}

body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }

header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 15px 5%; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: rgba(5, 5, 7, 0.95); backdrop-filter: blur(10px); z-index: 1000;
}

.logo { color: var(--primary); font-family: 'Syncopate', sans-serif; font-size: 14px; letter-spacing: 2px; text-decoration: none; }

.user-controls { display: flex; align-items: center; gap: 10px; }

.city-picker {
    background: #111; color: white; border: 2px solid var(--primary);
    padding: 8px; border-radius: 10px; font-weight: 700; cursor: pointer;
}

.top-bar { display: flex; gap: 10px; padding: 15px 5%; background: rgba(255,255,255,0.02); flex-wrap: wrap; }
input, select.filter-select { padding: 10px; border-radius: 12px; border: 1px solid var(--border); background: #111; color: white; flex: 1; min-width: 150px; }

.container {
    padding: 20px 5%; display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px;
}

.market-card { background: #0f0f13; padding: 20px; border-radius: 24px; border: 1px solid var(--border); transition: 0.3s; }
.market-card:hover { border-color: var(--primary); transform: translateY(-5px); }

.nav-tabs { display: flex; gap: 8px; margin: 15px 0; }
.btn { padding: 10px; border-radius: 12px; border: none; cursor: pointer; font-size: 11px; font-weight: 700; flex: 1; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; }

.maps { background: #4285F4; color: white; }
.uber { background: black; color: white; border: 1px solid #333; }
.whatsapp { background: #25D366; color: white; }

.catalog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
.item-card { background: #1a1a1a; padding: 10px; border-radius: 16px; position: relative; }
.item-thumb { width: 100%; height: 80px; object-fit: cover; border-radius: 10px; margin-bottom: 5px; }

.wish-btn { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.6); border: none; color: var(--primary); border-radius: 50%; width: 25px; height: 25px; cursor: pointer; }

.gali { font-size: 11px; color: var(--accent); margin: 10px 0; font-weight: 600; }

.budget-box {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #111; padding: 15px 30px; border-radius: 40px; 
    border: 1px solid var(--primary); z-index: 2000; display: flex; align-items: center; gap: 20px;
}

.wishlist-panel {
    position: fixed; right: 20px; top: 120px; background: #111; padding: 15px; 
    border-radius: 20px; width: 200px; border: 1px solid var(--border); display: none;
}
@media (min-width: 1200px) { .wishlist-panel { display: block; } }

.login-btn { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 12px; }
.profile-img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary); display: none; cursor: pointer; }

.video-box { display: none; margin-top: 10px; border-radius: 15px; overflow: hidden; }
</style>
</head>

<body>

<header>
    <a href="#" class="logo">BAZAARCRAFT</a>
    <div class="user-controls">
        <select class="city-picker" onchange="updateCity(this.value)">
            <option value="delhi">DELHI</option>
            <option value="mumbai">MUMBAI</option>
            <option value="kolkata">KOLKATA</option>
            <option value="jaipur">JAIPUR</option>
            <option value="lucknow">LUCKNOW</option>
            <option value="varanasi">VARANASI</option>
            <option value="patna">PATNA</option>
            <option value="bhopal">BHOPAL</option>
            <option value="indore">INDORE</option>
            <option value="pune">PUNE</option>
            <option value="bangalore">BANGALORE</option>
        </select>
        <button id="login-btn" class="login-btn" onclick="login()">LOGIN</button>
        <img id="user-img" class="profile-img" onclick="logout()">
    </div>
</header>

<div class="top-bar">
    <input type="text" placeholder="🔍 Search item (e.g. Mirror)..." onkeyup="search(this.value)">
    <select class="filter-select" onchange="filterBudget(this.value)">
        <option value="all">Any Budget</option>
        <option value="500">Under ₹500</option>
        <option value="1000">Under ₹1000</option>
    </select>
</div>

<div class="container" id="feed"></div>

<div class="wishlist-panel">
    <h4 style="margin:0 0 10px 0; color:var(--primary); font-size:12px;">❤️ SAVED FINDS</h4>
    <div id="wishlist-content" style="font-size:11px; max-height:200px; overflow-y:auto; margin-bottom:10px;"></div>
    <button onclick="exportPDF()" style="width:100%; background:var(--primary); border:none; color:white; padding:8px; border-radius:8px; font-weight:700; cursor:pointer; font-size:10px;">📄 DOWNLOAD PDF</button>
</div>

<div class="budget-box">
    <div style="font-size:11px; opacity:0.7;">TOTAL: <span id="total" style="font-size:20px; font-weight:700; color:var(--primary);">₹0</span></div>
    <button onclick="resetTotal()" style="background:none; border:1px solid #444; color:white; padding:5px 10px; border-radius:10px; cursor:pointer; font-size:10px;">RESET</button>
</div>

<script>
// --- 1. FIREBASE INITIALIZATION ---
// Replace these with your actual Firebase project settings
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let wallet = 0;
let wishlist = [];
let currentCity = "delhi";
let currentUser = null;

// --- 2. AUTH LOGIC ---
function login() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider);
}

function logout() {
    if(confirm("Logout?")) auth.signOut().then(() => location.reload());
}

auth.onAuthStateChanged(user => {
    if (user) {
        currentUser = user;
        document.getElementById('login-btn').style.display = 'none';
        document.getElementById('user-img').src = user.photoURL;
        document.getElementById('user-img').style.display = 'block';
        loadCloudData();
    }
});

function loadCloudData() {
    db.collection("users").doc(currentUser.uid).get().then(doc => {
        if(doc.exists) {
            wishlist = doc.data().wishlist || [];
            renderWishlist();
        }
    });
}

// --- 3. THE FULL DATABASE (11 CITIES) ---
const masterDB = {
    "delhi": [
        {id:"gVVK5Q6-OG0", m:"Banjara Market", lat:"28.4132", lng:"77.1000", items:[{n:"Mirrors", p:800},{n:"Ceramics", p:200}], nav:"Sec 54 Metro → Gaushala Road", vendor:"Raju Decor", phone:"919999999999"},
        {id:"tOVVnRnoml0", m:"Chawri Bazaar", lat:"28.6496", lng:"77.2274", items:[{n:"Antique Decor", p:1200}], nav:"Near Standard Sweets", vendor:"Old Delhi Arts", phone:"919888888888"},
        {id:"wpPnBZOggAE", m:"Lajpat Nagar", lat:"28.5677", lng:"77.2432", items:[{n:"Fabrics", p:250}], nav:"Gate 1 Central Market", vendor:"Fabric Hub", phone:"919777777777"}
    ],
    "mumbai": [
        {id:"2x-2aqYnjTk", m:"Crawford Market", lat:"18.9472", lng:"72.8340", items:[{n:"Lamps", p:400}], nav:"Behind Mahatma Phule Mandai", vendor:"A1 Lights", phone:"918888888888"},
        {id:"k0HhWjGd9XQ", m:"Chor Bazaar", lat:"18.9619", lng:"72.8310", items:[{n:"Vintage Hub", p:1000}], nav:"Mutton Street", vendor:"Antique King", phone:"917777777777"}
    ],
    "kolkata":[{id:"vxqcwUGuTIU", m:"Gariahat", lat:"22.5186", lng:"88.3664", items:[{n:"Saree", p:900}], nav:"Gariahat Crossing", vendor:"Bengal Crafts", phone:"9196"}],
    "jaipur":[{id:"_Ut-aGpCVaU", m:"Bapu Bazar", lat:"26.9189", lng:"75.8236", items:[{n:"Mojaris", p:350}], nav:"Sanganeri Gate", vendor:"Pink City Art", phone:"9195"}],
    "varanasi":[{id:"nVAeSFIGgAE", m:"Thatheri", lat:"25.3117", lng:"82.9996", items:[{n:"Brassware", p:500}], nav:"Near Chowk", vendor:"Kashi Brass", phone:"9194"}],
    "lucknow":[{id:"V_jYSLeCxQ4", m:"Aminabad", lat:"26.8457", lng:"80.9272", items:[{n:"Chikan Kurti", p:700}], nav:"Pratap Market", vendor:"Lucknowi Hub", phone:"9193"}],
    "patna":[{id:"tp10ZagNXfA", m:"Maurya Lok", lat:"25.6122", lng:"85.1314", items:[{n:"Handicrafts", p:250}], nav:"Museum Road", vendor:"Bihar Art", phone:"9192"}],
    "bhopal":[{id:"C6Nv6hl34SE", m:"New Market", lat:"23.2311", lng:"77.3996", items:[{n:"Bead Bag", p:300}], nav:"Inner Jeweller Lane", vendor:"MP Crafts", phone:"9191"}],
    "indore":[{id:"9N--Md7hu0Q", m:"MT Market", lat:"22.7164", lng:"75.8542", items:[{n:"Fabric", p:400}], nav:"Clock Tower Area", vendor:"Indore Textiles", phone:"9190"}],
    "pune":[{id:"1g3nGOsMH0A", m:"Juna Bazaar", lat:"18.5284", lng:"73.8569", items:[{n:"Antiques", p:400}], nav:"Kesba Peth", vendor:"Vintage Pune", phone:"9189"}],
    "bangalore":[{id:"Tv3gGVG2F38", m:"Chickpet", lat:"12.9698", lng:"77.5772", items:[{n:"Silk", p:1500}], nav:"Old City Area", vendor:"Silk House", phone:"9188"}]
};

// --- 4. CORE FUNCTIONS ---
function render(data) {
    const feed = document.getElementById("feed");
    feed.innerHTML = "";
    data.forEach(v => {
        if(v.items.length === 0) return;
        let maps = `https://www.google.com/maps/search/?api=1&query=${v.lat},${v.lng}`;
        let uber = `https://m.uber.com/ul/?action=setPickup&dropoff[latitude]=${v.lat}&dropoff[longitude]=${v.lng}`;
        
        feed.innerHTML += `
        <div class="market-card">
            <h3 style="margin:0; color:var(--primary); font-size:16px;">${v.m.toUpperCase()}</h3>
            <div class="nav-tabs">
                <a href="${maps}" target="_blank" class="btn maps">MAPS</a>
                <a href="${uber}" target="_blank" class="btn uber">UBER</a>
                <a href="https://wa.me/${v.phone}" target="_blank" class="btn whatsapp">WA</a>
            </div>
            <div class="catalog-grid">
                ${v.items.map(i => `
                <div class="item-card">
                    <button class="wish-btn" onclick="saveToWishlist('${i.n}', ${i.p}, '${v.m}', '${v.nav}')">♥</button>
                    <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" class="item-thumb">
                    <div style="display:flex; justify-content:space-between; align-items:center; cursor:pointer;" onclick="addToBudget(${i.p})">
                        <span style="font-size:11px;">${i.n}</span>
                        <span style="color:var(--accent); font-weight:700; font-size:11px;">₹${i.p}</span>
                    </div>
                </div>`).join("")}
            </div>
            <div class="gali">📍 ${v.nav}</div>
            <button onclick="toggleVid('${v.id}')" style="width:100%; padding:10px; border-radius:10px; border:1px solid #333; background:none; color:white; cursor:pointer; font-size:11px; margin-top:10px;">🎥 WATCH TOUR</button>
            <div id="${v.id}" class="video-box">
                <iframe width="100%" height="200" src="https://www.youtube.com/embed/${v.id}" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>`;
    });
}

function saveToWishlist(name, price, market, nav) {
    wishlist.push({name, price, market, nav});
    if(currentUser) {
        db.collection("users").doc(currentUser.uid).set({ wishlist: wishlist });
    }
    renderWishlist();
}

function renderWishlist() {
    const box = document.getElementById("wishlist-content");
    box.innerHTML = wishlist.length ? "" : "<div style='opacity:0.5'>Wishlist empty</div>";
    wishlist.forEach(i => box.innerHTML += `<div style="border-bottom:1px solid #222; padding:5px 0;">${i.name} - ₹${i.price}</div>`);
}

function addToBudget(p) { wallet += p; document.getElementById("total").innerText = "₹" + wallet; }
function resetTotal() { wallet = 0; document.getElementById("total").innerText = "₹0"; }
function updateCity(city) { currentCity = city; render(masterDB[city]); }
function toggleVid(id) { let el = document.getElementById(id); el.style.display = el.style.display === "block" ? "none" : "block"; }

function search(q) {
    let data = masterDB[currentCity];
    let filtered = data.map(m => ({ ...m, items: m.items.filter(i => i.n.toLowerCase().includes(q.toLowerCase())) }));
    render(filtered);
}

function filterBudget(val) {
    let data = masterDB[currentCity];
    if(val === "all") return render(data);
    let filtered = data.map(m => ({ ...m, items: m.items.filter(i => i.p <= val) }));
    render(filtered);
}

function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text("BazaarCraft: My Shopping Itinerary", 20, 20);
    let y = 35;
    wishlist.forEach((item, index) => {
        doc.text(`${index+1}. ${item.name} (₹${item.price}) @ ${item.market}`, 20, y);
        y += 10;
    });
    doc.save("My_BazaarCraft_Trip.pdf");
}

// Start
updateCity("delhi");
</script>

</body>
</html>
