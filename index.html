<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazaarCraft | The Ultimate Market Navigator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Poppins:wght@300;400;600&display=swap');
        
        :root {
            --primary: #FF7B00; --bg: #050507; --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1); --accent: #FFB703;
        }

        body { 
            margin: 0; font-family: 'Poppins', sans-serif; background-color: var(--bg); color: white;
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #050507 80%);
            min-height: 100vh;
        }

        /* Pulse Ticker */
        .pulse-bar { background: #111; color: var(--accent); font-size: 11px; padding: 8px; border-bottom: 1px solid var(--border); overflow: hidden; }
        .ticker { display: inline-block; animation: scroll 30s linear infinite; white-space: nowrap; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-family: 'Syncopate', sans-serif; font-size: 18px; color: var(--primary); text-decoration: none; }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }

        .market-card {
            background: var(--glass); border: 1px solid var(--border); border-radius: 32px;
            padding: 30px; backdrop-filter: blur(15px); transition: 0.5s ease;
        }
        .market-card:hover { border-color: var(--primary); transform: translateY(-5px); }

        .nav-btn {
            background: var(--primary); color: white; border: none; padding: 8px 15px;
            border-radius: 20px; font-size: 10px; font-weight: 700; cursor: pointer; text-decoration: none;
        }

        .item-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.02);
            border-radius: 16px; cursor: pointer;
        }
        .price-tag { color: #4ade80; font-weight: 700; }

        .gali-script {
            font-size: 11px; color: #4ade80; border: 1px dashed rgba(74, 222, 128, 0.3);
            padding: 15px; border-radius: 15px; margin: 20px 0; background: rgba(74, 222, 128, 0.02);
        }

        .video-box { display: none; margin-top: 20px; border-radius: 20px; overflow: hidden; }

        .footer-intel {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(30px);
            padding: 18px 40px; border-radius: 60px; border: 1px solid var(--primary);
            display: flex; align-items: center; gap: 50px; z-index: 2000;
        }
    </style>
</head>
<body>
    <div class="pulse-bar">
        <div class="ticker">🚀 MARKET PULSE: Varanasi Brass UP (+5%) | Delhi Banjara: Police checking today, avoid Gali 1 | Jaipur: Blue Pottery stock refreshed! | Kolkata: Gariahat crowds low today.</div>
    </div>

    <header>
        <a href="#" class="logo">BAZAARCRAFT</a>
        <select id="city-selector" onchange="updateFeed(this.value)" style="background:none; color:white; border:none; font-weight:700; cursor:pointer;">
            <option value="delhi">DELHI</option>
            <option value="mumbai">MUMBAI</option>
            <option value="kolkata">KOLKATA</option>
            <option value="jaipur">JAIPUR</option>
            <option value="lucknow">LUCKNOW</option>
            <option value="varanasi">VARANASI</option>
            <option value="patna">PATNA</option>
            <option value="bhopal">BHOPAL</option>
            <option value="indore">INDORE</option>
            <option value="pune">PUNE</option>
            <option value="bangalore">BANGALORE</option>
        </select>
    </header>

    <div class="container" id="feed"></div>

    <div class="footer-intel">
        <div>
            <span style="font-size:10px; opacity:0.6; display:block;">CASH TO CARRY</span>
            <span id="budget-total" style="font-size:24px; font-weight:700; color:var(--primary);">₹0</span>
        </div>
        <button onclick="resetTotal()" style="background:none; border:1px solid #444; color:white; padding:10px 20px; border-radius:30px; cursor:pointer;">RESET</button>
    </div>

    <script>
        let currentBudget = 0;
        
        const masterDB = {
            "delhi": [
                { id: "oxdjZ8nSDOs", m: "Banjara Market", map: "https://www.google.com/maps/search/Banjara+Market+Gurgaon", items: [{n: "Full Length Mirror", p: 1200}, {n: "Ceramic Vase", p: 250}], nav: "Exit Sector 54 Metro. Rickshaw to 'Gaushala Road'. Gali 2 has the best mirrors.", tip: "Bargain starts at 40%." },
                { id: "wpPnBZOggAE", m: "Lajpat Nagar", map: "https://www.google.com/maps/search/Lajpat+Nagar+Market", items: [{n: "Designer Kurti", p: 650}], nav: "Enter Gate 1. Walk past 3C's Mall. Left at second jewelry stall.", tip: "Monday is clearance day." },
                { id: "qM5Ycwz8-LA", m: "Sarojini Nagar", map: "https://www.google.com/maps/search/Sarojini+Nagar+Market", items: [{n: "Summer Tops", p: 150}], nav: "Exit Sarojini Metro Gate 2. Follow the crowd to the main export lane.", tip: "Carry your own carry bags." }
            ],
            "kolkata": [
                { id: "399kxCYl7Yw", m: "Gariahat", map: "https://www.google.com/maps/search/Gariahat+Market", items: [{n: "Tant Saree", p: 900}], nav: "Best sarees are on the footpaths near Gariahat flyover, towards Golpark.", tip: "Evening is best for vibes." },
                { id: "kcjqDg0hmRE", m: "Galiff Street", map: "https://www.google.com/maps/search/Galiff+Street+Market", items: [{n: "Rare Plants", p: 150}], nav: "Sunday only. Nearest station: Shyambazar Metro.", tip: "Market closes by 11 AM." }
            ],
            "jaipur": [
                { id: "kCdTLhyzl8A", m: "Bapu Bazaar", map: "https://www.google.com/maps/search/Bapu+Bazaar+Jaipur", items: [{n: "Leather Mojari", p: 350}], nav: "Enter Sanganeri Gate. Wholesale juttis are in the first left 'Kucha'.", tip: "Check stitching carefully." }
            ],
            "varanasi": [
                { id: "Rf1IHg85_TQ", m: "Thatheri Bazaar", map: "https://www.google.com/maps/search/Thatheri+Bazaar+Varanasi", items: [{n: "Brass Kalash", p: 450}], nav: "From Godowlia, walk towards Chowk. Thatheri Gali is near the silver shops.", tip: "Buy brass by metal weight." }
            ],
            "mumbai": [{ id: "WbY2l_VOigo", m: "Crawford", map: "https://www.google.com/maps/search/Crawford+Market", items: [{n: "Decor", p: 200}], nav: "Best decor is in the lane behind the main fruit market.", tip: "Wholesale rates for 3+ items." }],
            "lucknow": [{ id: "8TWLIsL6fXM", m: "Aminabad", map: "https://www.google.com/maps/search/Aminabad+Lucknow", items: [{n: "Chikan Kurti", p: 700}], nav: "Go to Pratap Market for the highest quality hand-work.", tip: "Verify handwork vs machine." }],
            "patna": [{ id: "RDfb3o5o6Sc", m: "Maurya Lok", map: "https://www.google.com/maps/search/Maurya+Lok+Patna", items: [{n: "Handicrafts", p: 250}], nav: "Artisan stalls are located near the north entrance gate.", tip: "Fixed Govt rates apply." }],
            "bhopal": [{ id: "rsOPFJebPMg", m: "New Market", map: "https://www.google.com/maps/search/New+Market+Bhopal", items: [{n: "Bead Bag", p: 300}], nav: "Famous 'Bhopali Batua' shops are located in the inner jewelry lane.", tip: "Ask for pure Zardosi." }],
            "indore": [{ id: "7LyTGXM3haU", m: "MT Market", map: "https://www.google.com/maps/search/MT+Cloth+Market+Indore", items: [{n: "Fabric", p: 400}], nav: "The curtain wholesale lane is the third right from the main clock tower.", tip: "Bulk purchase hub." }],
            "pune": [{ id: "aGl_H_gGf_o", m: "Juna Bazaar", map: "https://www.google.com/maps/search/Juna+Bazaar+Pune", items: [{n: "Antiques", p: 400}], nav: "Best finds are early morning on the footpath stalls.", tip: "Wednesday/Sunday only." }],
            "bangalore": [{ id: "1h_wt99EhXQ", m: "Chickpet", map: "https://www.google.com/maps/search/Chickpet+Bangalore", items: [{n: "Silk Saree", p: 1500}], nav: "The saree wholesale buildings are near the old city police station.", tip: "Heavy wedding hub." }]
        };

        function render(list) {
            const feed = document.getElementById('feed'); feed.innerHTML = "";
            list.forEach(v => {
                const card = document.createElement('div'); card.className = 'market-card';
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                        <div style="font-size:10px; color:var(--accent); font-weight:700;">${v.m.toUpperCase()}</div>
                        <a href="${v.map}" target="_blank" class="nav-btn">📍 NAVIGATE</a>
                    </div>
                    ${v.items.map(i => `<div class="item-row" onclick="addToBudget(${i.p})"><span>➕ ${i.n}</span><span class="price-tag">₹${i.p}</span></div>`).join('')}
                    <div class="gali-script"><strong>GALI GUIDE:</strong> ${v.nav}</div>
                    <div style="font-size:11px; color:var(--text-muted); margin-bottom:15px;">💡 ${v.tip}</div>
                    <button onclick="toggleVideo('${v.id}')" style="width:100%; padding:15px; border-radius:18px; border:none; background:white; color:black; font-weight:700; cursor:pointer;">WATCH TOUR</button>
                    <div id="${v.id}" class="video-box">
                        <div style="position:relative; padding-bottom:56.25%; height:0;"><iframe src="https://www.youtube.com/embed/${v.id}" style="position:absolute; width:100%; height:100%; border:none;" allowfullscreen></iframe></div>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        function addToBudget(p) { currentBudget += p; document.getElementById('budget-total').innerText = "₹" + currentBudget; }
        function resetTotal() { currentBudget = 0; document.getElementById('budget-total').innerText = "₹0"; }
        function toggleVideo(id) { let box = document.getElementById(id); box.style.display = (box.style.display === 'block') ? 'none' : 'block'; }
        function updateFeed(val) { render(masterDB[val]); }

        window.onload = () => render(masterDB.delhi);
    </script>
</body>
</html>
