<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BazaarCraft | Smart Bazaar Finder</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Poppins:wght@300;400;600&display=swap');

:root {
--primary:#FF7B00;
--bg:#050507;
--card:#111;
--border:rgba(255,255,255,0.1);
}

body {margin:0;font-family:Poppins;background:var(--bg);color:white;}

header {
display:flex;justify-content:space-between;align-items:center;
padding:15px;border-bottom:1px solid var(--border);
position:sticky;top:0;background:#050507;
}

.logo {color:var(--primary);font-family:Syncopate;}

.container {
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
}

.market-card {
background:var(--card);
padding:15px;border-radius:20px;
border:1px solid var(--border);
}

.btn {
padding:8px;border-radius:10px;border:none;cursor:pointer;font-size:12px;
margin-right:5px;
}

.maps {background:#4285F4;color:white;}
.whatsapp {background:#25D366;color:black;}

.item-card {
background:#1a1a1a;padding:10px;border-radius:12px;
margin:5px 0;cursor:pointer;
display:flex;justify-content:space-between;align-items:center;
}

.top-bar {
display:flex;gap:10px;padding:15px;
flex-wrap:wrap;
}

input,select {
padding:8px;border-radius:10px;border:none;
}

.upload-box {
border:1px dashed #555;
margin:15px;padding:15px;text-align:center;border-radius:15px;
}

.budget-box {
position:fixed;bottom:20px;left:50%;
transform:translateX(-50%);
background:#111;padding:15px 25px;
border-radius:30px;border:1px solid var(--primary);
}

.wishlist {
position:fixed;right:10px;top:80px;
background:#111;padding:10px;border-radius:15px;
max-width:200px;
}

</style>
</head>

<body>

<header>
<div class="logo">BAZAARCRAFT</div>
<select onchange="updateCity(this.value)">
<option value="delhi">Delhi</option>
<option value="mumbai">Mumbai</option>
<option value="pune">Pune</option>
</select>
</header>

<div class="top-bar">
<input type="text" placeholder="Search item..." onkeyup="search(this.value)">
<select onchange="filterBudget(this.value)">
<option value="all">All Budget</option>
<option value="500">Under ₹500</option>
<option value="1000">Under ₹1000</option>
</select>
</div>

<div class="upload-box">
<h3>📸 Upload Your Home Setup</h3>
<input type="file">
<p style="opacity:0.6;font-size:12px;">(Coming soon: community gallery)</p>
</div>

<div class="container" id="feed"></div>

<div class="wishlist">
<h4>❤️ Wishlist</h4>
<div id="wishlist"></div>
</div>

<div class="budget-box">
Total ₹<span id="total">0</span>
<button onclick="reset()">Reset</button>
</div>

<script>

let wallet=0;
let currentData=[];
let wishlist=[];

const db={
delhi:[
{
name:"Banjara Market",
lat:28.41,lng:77.10,
vendor:"Raju Decor",phone:"919999999999",
items:[
{n:"Mirror",p:500},
{n:"Lamp",p:300}
]
}
],
mumbai:[
{
name:"Crawford Market",
lat:18.94,lng:72.83,
vendor:"A1 Lights",phone:"918888888888",
items:[
{n:"Lights",p:400}
]
}
],
pune:[
{
name:"Juna Bazaar",
lat:18.52,lng:73.85,
vendor:"Vintage Hub",phone:"917777777777",
items:[
{n:"Antiques",p:700}
]
}
]
};

function render(data){
const feed=document.getElementById("feed");
feed.innerHTML="";

data.forEach(m=>{
let maps=`https://www.google.com/maps?q=${m.lat},${m.lng}`;
let wa=`https://wa.me/${m.phone}`;

let html=`
<div class="market-card">
<h3>${m.name}</h3>

<a href="${maps}" target="_blank"><button class="btn maps">Maps</button></a>
<a href="${wa}" target="_blank"><button class="btn whatsapp">WhatsApp</button></a>

${m.items.map(i=>`
<div class="item-card">
<span onclick="add(${i.p})">${i.n} - ₹${i.p}</span>
<button onclick="saveItem('${i.n}',${i.p})">❤️</button>
</div>
`).join("")}

<p>🏪 ${m.vendor}</p>
</div>
`;

feed.innerHTML+=html;
});
}

function updateCity(city){
currentData=db[city];
render(currentData);
}

function add(p){
wallet+=p;
document.getElementById("total").innerText=wallet;
}

function reset(){
wallet=0;
document.getElementById("total").innerText=0;
}

function filterBudget(val){
if(val==="all") return render(currentData);

let filtered=currentData.map(m=>({
...m,
items:m.items.filter(i=>i.p<=val)
}));

render(filtered);
}

function search(q){
q=q.toLowerCase();

let filtered=currentData.map(m=>({
...m,
items:m.items.filter(i=>i.n.toLowerCase().includes(q))
}));

render(filtered);
}

function saveItem(name,price){
wishlist.push({name,price});
localStorage.setItem("wishlist",JSON.stringify(wishlist));
renderWishlist();
}

function renderWishlist(){
let box=document.getElementById("wishlist");
box.innerHTML="";

wishlist=JSON.parse(localStorage.getItem("wishlist"))||[];

wishlist.forEach(i=>{
box.innerHTML+=`<div>${i.name} ₹${i.price}</div>`;
});
}

// INIT
updateCity("delhi");
renderWishlist();

</script>

</body>
</html>
